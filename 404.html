<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KLOVER Docs</title>
<script>
  // GitHub Pages SPA fallback: remember the deep path, then bounce to the
  // project root. The base (repo name) is auto-detected so this works in any repo.
  (function () {
    sessionStorage.setItem('klover-redirect', location.pathname + location.search);
    var base = '/' + (location.pathname.split('/')[1] || '') + '/';
    location.replace(base);
  }());
</script>
</head>
<body></body>
</html>
