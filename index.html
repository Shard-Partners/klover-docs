<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KLOVER Docs</title>
<meta name="description" content="Official documentation for KLOVER, the K-Culture Web3 ecosystem." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
/* ============================================================
   KLOVER documentation base styles
   ============================================================ */
:root {
  --kl-bg: #ffffff;
  --kl-bg-subtle: #f7f8fa;
  --kl-bg-elevated: #ffffff;
  --kl-text: #1b1f24;
  --kl-text-muted: #5b6571;
  --kl-text-faint: #6b7280;
  --kl-border: #e8eaed;
  --kl-border-strong: #d6dae0;
  --kl-accent: #16a34a;
  --kl-accent-hover: #128a3e;
  --kl-accent-soft: rgba(22, 163, 74, 0.10);
  --kl-accent-text: #0f7a37;
  --kl-code-bg: #f6f8fa;
  --kl-code-text: #b3216f;
  --kl-info: #2563eb;   --kl-info-bg: rgba(37,99,235,.08);
  --kl-success: #16a34a; --kl-success-bg: rgba(22,163,74,.09);
  --kl-warning: #d97706; --kl-warning-bg: rgba(217,119,6,.10);
  --kl-danger: #dc2626;  --kl-danger-bg: rgba(220,38,38,.08);
  --kl-shadow: 0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.06);
  --kl-shadow-lg: 0 12px 40px rgba(16,24,40,.16);
  --kl-header-h: 60px;
  --kl-sidebar-w: 296px;
  --kl-toc-w: 240px;
  --kl-content-max: 768px;
  --kl-radius: 10px;
  --kl-font: 'Inter', 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --kl-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
}
[data-theme="dark"] {
  --kl-bg: #0e1116;
  --kl-bg-subtle: #161a20;
  --kl-bg-elevated: #161a20;
  --kl-text: #e6edf3;
  --kl-text-muted: #9aa4b0;
  --kl-text-faint: #868f9b;
  --kl-border: #242a31;
  --kl-border-strong: #313840;
  --kl-accent: #2ec571;
  --kl-accent-hover: #43d182;
  --kl-accent-soft: rgba(46,197,113,.14);
  --kl-accent-text: #4ade80;
  --kl-code-bg: #1c2128;
  --kl-code-text: #f0a6c8;
  --kl-info: #60a5fa;   --kl-info-bg: rgba(96,165,250,.12);
  --kl-success: #4ade80; --kl-success-bg: rgba(74,222,128,.12);
  --kl-warning: #fbbf24; --kl-warning-bg: rgba(251,191,36,.12);
  --kl-danger: #f87171;  --kl-danger-bg: rgba(248,113,113,.12);
  --kl-shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.4);
  --kl-shadow-lg: 0 12px 40px rgba(0,0,0,.6);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--kl-header-h) + 24px); }
body { margin: 0; font-family: var(--kl-font); background: var(--kl-bg); color: var(--kl-text); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; line-height: 1.6; }
a { color: var(--kl-accent-text); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: var(--kl-accent-soft); }

/* ---------- Header ---------- */
.kl-header { position: fixed; top: 0; left: 0; right: 0; height: var(--kl-header-h); display: flex; align-items: center; gap: 16px; padding: 0 20px; background: color-mix(in srgb, var(--kl-bg) 88%, transparent); backdrop-filter: saturate(180%) blur(12px); border-bottom: 1px solid var(--kl-border); z-index: 100; }
.kl-brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; color: var(--kl-text); letter-spacing: -.02em; white-space: nowrap; }
.kl-brand:hover { text-decoration: none; }
.kl-brand .leaf { font-size: 20px; }
.kl-brand .tag { font-size: 11px; font-weight: 600; color: var(--kl-accent-text); background: var(--kl-accent-soft); padding: 2px 7px; border-radius: 20px; }
.kl-header-spacer { flex: 1; }
.kl-search-wrap { position: relative; width: min(340px, 38vw); }
.kl-search { width: 100%; height: 38px; padding: 0 36px; background: var(--kl-bg-subtle); border: 1px solid var(--kl-border); border-radius: var(--kl-radius); color: var(--kl-text); font-family: inherit; font-size: 14px; transition: border-color .15s, box-shadow .15s; }
.kl-search:focus { outline: none; border-color: var(--kl-accent); box-shadow: 0 0 0 3px var(--kl-accent-soft); background: var(--kl-bg); }
.kl-search::placeholder { color: var(--kl-text-faint); }
.kl-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--kl-text-faint); pointer-events: none; display: flex; }
.kl-search-kbd { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--kl-text-faint); border: 1px solid var(--kl-border-strong); border-radius: 5px; padding: 1px 6px; pointer-events: none; }
.kl-search-results { position: absolute; top: 46px; left: 0; right: 0; max-height: 60vh; overflow-y: auto; background: var(--kl-bg-elevated); border: 1px solid var(--kl-border); border-radius: var(--kl-radius); box-shadow: var(--kl-shadow-lg); padding: 6px; display: none; z-index: 120; }
.kl-search-results.open { display: block; }
.kl-result { display: block; padding: 9px 11px; border-radius: 7px; color: var(--kl-text); cursor: pointer; }
.kl-result:hover, .kl-result.active { background: var(--kl-accent-soft); text-decoration: none; }
.kl-result .r-title { font-weight: 600; font-size: 14px; }
.kl-result .r-crumb { font-size: 12px; color: var(--kl-text-faint); margin-bottom: 2px; }
.kl-result .r-snippet { font-size: 12.5px; color: var(--kl-text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kl-result mark { background: var(--kl-accent-soft); color: var(--kl-accent-text); border-radius: 3px; padding: 0 1px; }
.kl-search-empty { padding: 18px 12px; text-align: center; color: var(--kl-text-faint); font-size: 13px; }
.kl-iconbtn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: var(--kl-radius); background: transparent; border: 1px solid transparent; color: var(--kl-text-muted); cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
.kl-iconbtn:hover { background: var(--kl-bg-subtle); color: var(--kl-text); border-color: var(--kl-border); }

/* ---------- Language dropdown ---------- */
.kl-lang { position: relative; }
.kl-lang-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 11px; background: transparent; border: 1px solid var(--kl-border); border-radius: var(--kl-radius); color: var(--kl-text); cursor: pointer; font-family: inherit; font-size: 13.5px; font-weight: 500; transition: background .15s, border-color .15s; }
.kl-lang-btn:hover { background: var(--kl-bg-subtle); border-color: var(--kl-border-strong); }
.kl-lang-btn .chev { transition: transform .18s; color: var(--kl-text-faint); }
.kl-lang.open .kl-lang-btn .chev { transform: rotate(180deg); }
.kl-lang-menu { position: absolute; top: 46px; right: 0; min-width: 188px; background: var(--kl-bg-elevated); border: 1px solid var(--kl-border); border-radius: var(--kl-radius); box-shadow: var(--kl-shadow-lg); padding: 6px; z-index: 120; opacity: 0; visibility: hidden; transform: translateY(-6px); transition: opacity .16s, transform .16s, visibility .16s; }
.kl-lang.open .kl-lang-menu { opacity: 1; visibility: visible; transform: translateY(0); }
.kl-lang-opt { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 11px; border-radius: 7px; cursor: pointer; color: var(--kl-text); font-size: 14px; }
.kl-lang-opt:hover { background: var(--kl-bg-subtle); }
.kl-lang-opt .native { font-weight: 500; }
.kl-lang-opt .en-name { font-size: 11.5px; color: var(--kl-text-faint); }
.kl-lang-opt .check { color: var(--kl-accent); opacity: 0; display: flex; }
.kl-lang-opt.active .check { opacity: 1; }
.kl-lang-opt.active { background: var(--kl-accent-soft); }

/* ---------- Layout ---------- */
.kl-layout { display: flex; padding-top: var(--kl-header-h); }
.kl-sidebar { position: fixed; top: var(--kl-header-h); bottom: 0; left: 0; width: var(--kl-sidebar-w); overflow-y: auto; overscroll-behavior: contain; border-right: 1px solid var(--kl-border); background: var(--kl-bg); padding: 22px 16px 60px; }
.kl-main { flex: 1; min-width: 0; margin-left: var(--kl-sidebar-w); display: flex; justify-content: center; padding: 40px 48px 120px; }
.kl-article-wrap { width: 100%; max-width: var(--kl-content-max); }
.kl-toc { position: fixed; top: var(--kl-header-h); right: 0; width: var(--kl-toc-w); height: calc(100vh - var(--kl-header-h)); overflow-y: auto; padding: 40px 24px 60px; }
@media (min-width: 1081px) { .kl-main { margin-right: var(--kl-toc-w); } }

/* ---------- Sidebar nav ---------- */
.kl-nav-group { margin-bottom: 22px; }
.kl-nav-group-label { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--kl-text-faint); padding: 0 12px 8px; }
.kl-nav-link { display: flex; align-items: center; gap: 9px; padding: 7px 12px; border-radius: 8px; margin: 1px 0; color: var(--kl-text-muted); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .13s, color .13s; }
.kl-nav-link:hover { background: var(--kl-bg-subtle); color: var(--kl-text); text-decoration: none; }
.kl-nav-link.active { background: var(--kl-accent-soft); color: var(--kl-accent-text); font-weight: 600; }
.kl-nav-link .ico { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

/* ---------- Content / typography ---------- */
.kl-breadcrumb { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--kl-text-faint); margin-bottom: 18px; flex-wrap: wrap; }
.kl-breadcrumb a { color: var(--kl-text-muted); }
.kl-breadcrumb .sep { opacity: .6; }
.kl-article h1 { font-size: 34px; font-weight: 800; letter-spacing: -.025em; margin: 0 0 14px; line-height: 1.2; }
.kl-article h2 { font-size: 23px; font-weight: 700; letter-spacing: -.015em; margin: 44px 0 14px; line-height: 1.3; padding-top: 8px; scroll-margin-top: calc(var(--kl-header-h) + 24px); }
.kl-article h3 { font-size: 17.5px; font-weight: 700; margin: 28px 0 10px; }
.kl-article p { margin: 0 0 16px; }
.kl-lead { font-size: 18px; line-height: 1.6; color: var(--kl-text-muted); margin-bottom: 28px !important; }
.kl-article ul, .kl-article ol { margin: 0 0 16px; padding-left: 22px; }
.kl-article li { margin: 7px 0; }
.kl-article strong { color: var(--kl-text); font-weight: 700; }
.kl-article code { background: var(--kl-code-bg); color: var(--kl-code-text); font-size: .88em; padding: 2px 6px; border-radius: 6px; font-family: var(--kl-mono); }
.kl-article hr { border: none; border-top: 1px solid var(--kl-border); margin: 40px 0; }
.kl-article a { font-weight: 500; }
.kl-article blockquote { margin: 22px 0; padding: 4px 18px; border-left: 3px solid var(--kl-accent); color: var(--kl-text-muted); font-size: 16px; }
.kl-img-ph { display: flex; align-items: center; justify-content: center; gap: 8px; height: 180px; border: 1px dashed var(--kl-border-strong); border-radius: var(--kl-radius); color: var(--kl-text-faint); font-size: 15px; background: var(--kl-bg-subtle); margin: 18px 0; }

/* Hints / callouts */
.kl-hint { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--kl-radius); margin: 20px 0; font-size: 14.5px; border: 1px solid transparent; }
.kl-hint .h-ic { flex-shrink: 0; font-size: 17px; line-height: 1.5; }
.kl-hint .h-body { color: var(--kl-text); }
.kl-hint.info { background: var(--kl-info-bg); border-color: color-mix(in srgb, var(--kl-info) 26%, transparent); }
.kl-hint.success { background: var(--kl-success-bg); border-color: color-mix(in srgb, var(--kl-success) 26%, transparent); }
.kl-hint.warning { background: var(--kl-warning-bg); border-color: color-mix(in srgb, var(--kl-warning) 30%, transparent); }
.kl-hint.danger { background: var(--kl-danger-bg); border-color: color-mix(in srgb, var(--kl-danger) 28%, transparent); }
.kl-hint.accent { background: var(--kl-accent-soft); border-color: color-mix(in srgb, var(--kl-accent) 30%, transparent); }

/* Placeholders */
.kl-tbd { background: #fce7f3; color: #be185d; font-weight: 600; padding: 1px 7px; border-radius: 5px; font-size: .92em; border: 1px solid #f9a8d4; }
[data-theme="dark"] .kl-tbd { background: rgba(236,72,153,.20); color: #f9a8d4; border-color: rgba(236,72,153,.45); }
.kl-soon { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; text-align: center; padding: 34px 24px; border: 1.5px dashed var(--kl-border-strong); border-radius: var(--kl-radius); background: var(--kl-bg-subtle); margin: 22px 0; }
.kl-soon-badge { font-size: 18px; font-weight: 800; color: var(--kl-text); letter-spacing: -.01em; }
.kl-soon-sub { font-size: 13.5px; color: var(--kl-text-faint); }

/* Timeline (roadmap) */
.kl-timeline { position: relative; margin: 26px 0 8px; padding-left: 6px; }
.kl-tl-item { position: relative; padding: 0 0 28px 34px; border-left: 2px solid var(--kl-border); }
.kl-tl-item:last-child { border-left-color: transparent; padding-bottom: 4px; }
.kl-tl-dot { position: absolute; left: -9px; top: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--kl-bg); border: 2px solid var(--kl-accent); }
.kl-tl-item.future .kl-tl-dot { border-color: var(--kl-border-strong); }
.kl-tl-phase { font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--kl-accent-text); margin-bottom: 3px; }
.kl-tl-title { font-size: 18px !important; font-weight: 700; margin: 0 0 6px !important; padding-top: 0 !important; }
.kl-tl-body { font-size: 14.5px; color: var(--kl-text-muted); }

/* Code block */
.kl-code { border: 1px solid var(--kl-border); border-radius: var(--kl-radius); overflow: hidden; margin: 18px 0; background: var(--kl-code-bg); }
.kl-code-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--kl-border); font-size: 12.5px; color: var(--kl-text-muted); font-family: var(--kl-mono); }
.kl-copy { background: transparent; border: 1px solid var(--kl-border-strong); color: var(--kl-text-muted); border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; font-family: var(--kl-font); transition: background .13s, color .13s; }
.kl-copy:hover { background: var(--kl-bg); color: var(--kl-text); }
.kl-code pre { margin: 0; padding: 14px 16px; overflow-x: auto; }
.kl-code code { background: none; color: var(--kl-text); padding: 0; font-size: 13.5px; font-family: var(--kl-mono); line-height: 1.7; }

/* Tables */
.kl-table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 14px; }
.kl-table th, .kl-table td { text-align: left; padding: 10px 14px; border: 1px solid var(--kl-border); }
.kl-table th { background: var(--kl-bg-subtle); font-weight: 700; }

/* Tabs */
.kl-tabs { margin: 18px 0; }
.kl-tab-heads { display: flex; gap: 4px; border-bottom: 1px solid var(--kl-border); }
.kl-tab-head { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 9px 14px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--kl-text-muted); cursor: pointer; margin-bottom: -1px; }
.kl-tab-head.active { color: var(--kl-accent-text); border-bottom-color: var(--kl-accent); }
.kl-tab-pane { display: none; padding-top: 6px; }
.kl-tab-pane.active { display: block; }

/* Cards */
.kl-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin: 22px 0; }
.kl-card { padding: 20px; border: 1px solid var(--kl-border); border-radius: var(--kl-radius); background: var(--kl-bg-elevated); transition: border-color .15s, transform .15s, box-shadow .15s; }
.kl-card:hover { border-color: var(--kl-accent); transform: translateY(-2px); box-shadow: var(--kl-shadow); }
.kl-card .ic { font-size: 24px; margin-bottom: 10px; }
.kl-card .ct { font-weight: 700; font-size: 16px; margin-bottom: 5px; }
.kl-card .cd { font-size: 13.5px; color: var(--kl-text-muted); }

/* Accordion / expandable */
.kl-accordion { border: 1px solid var(--kl-border); border-radius: var(--kl-radius); margin: 12px 0; overflow: hidden; }
.kl-acc-head { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; background: transparent; border: none; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--kl-text); cursor: pointer; text-align: left; }
.kl-acc-head:hover { background: var(--kl-bg-subtle); }
.kl-acc-ic { color: var(--kl-text-faint); font-size: 18px; transition: transform .2s; flex-shrink: 0; }
.kl-accordion.open .kl-acc-ic { transform: rotate(45deg); }
.kl-acc-body { display: none; padding: 0 16px 14px; color: var(--kl-text-muted); font-size: 14.5px; }
.kl-accordion.open .kl-acc-body { display: block; }
.kl-acc-body p { margin: 0; }

/* Helpful footer */
.kl-helpful { display: flex; align-items: center; gap: 12px; margin-top: 56px; padding: 18px 0; border-top: 1px solid var(--kl-border); font-size: 14px; color: var(--kl-text-muted); }
.kl-helpful-btn { background: transparent; border: 1px solid var(--kl-border-strong); color: var(--kl-text-muted); border-radius: 8px; padding: 6px 16px; font-family: inherit; font-size: 13.5px; cursor: pointer; transition: background .13s, border-color .13s, color .13s; }
.kl-helpful-btn:hover { border-color: var(--kl-accent); color: var(--kl-accent-text); background: var(--kl-accent-soft); }
.kl-helpful .thanks { color: var(--kl-accent-text); font-weight: 600; }
.kl-meta { font-size: 13px; color: var(--kl-text-faint); margin-top: 10px; }

/* Pager */
.kl-pager { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 28px; }
.kl-pager-btn { display: flex; flex-direction: column; gap: 4px; padding: 16px 18px; border: 1px solid var(--kl-border); border-radius: var(--kl-radius); cursor: pointer; transition: border-color .15s, background .15s; }
.kl-pager-btn:hover { border-color: var(--kl-accent); background: var(--kl-bg-subtle); text-decoration: none; }
.kl-pager-btn.next { text-align: right; }
.kl-pager-dir { font-size: 12px; color: var(--kl-text-faint); font-weight: 600; }
.kl-pager-title { font-size: 15px; font-weight: 600; color: var(--kl-text); }
.kl-pager-btn.empty { visibility: hidden; }

/* Right TOC */
.kl-toc-title { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--kl-text-faint); margin-bottom: 12px; }
.kl-toc-link { display: block; padding: 5px 0 5px 12px; border-left: 2px solid var(--kl-border); color: var(--kl-text-muted); font-size: 13px; cursor: pointer; transition: color .13s, border-color .13s; }
.kl-toc-link:hover { color: var(--kl-text); text-decoration: none; }
.kl-toc-link.active { color: var(--kl-accent-text); border-left-color: var(--kl-accent); font-weight: 600; }

/* Home / hero */
.kl-hero { padding: 20px 0 8px; }
.kl-hero .eyebrow { display: inline-block; font-size: 13px; font-weight: 600; color: var(--kl-accent-text); background: var(--kl-accent-soft); padding: 5px 14px; border-radius: 20px; margin-bottom: 22px; }
.kl-hero .leaf-xl { font-size: 60px; line-height: 1; margin-bottom: 16px; }
.kl-hero h1 { font-size: 50px; font-weight: 800; letter-spacing: -.03em; line-height: 1.06; margin: 0 0 18px; }
.kl-hero .grad { background: linear-gradient(120deg, var(--kl-accent), #5ad1a0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.kl-hero .lead { font-size: 19px; color: var(--kl-text-muted); max-width: 600px; margin: 0 0 30px; line-height: 1.6; }
.kl-hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
.kl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: var(--kl-radius); font-weight: 600; font-size: 15px; cursor: pointer; transition: transform .15s, background .15s, border-color .15s; border: 1px solid transparent; }
.kl-btn:hover { text-decoration: none; transform: translateY(-1px); }
.kl-btn-primary { background: #15803d; color: #fff; }
.kl-btn-primary:hover { background: #126b33; }
.kl-btn-ghost { background: transparent; border-color: var(--kl-border-strong); color: var(--kl-text); }
.kl-btn-ghost:hover { border-color: var(--kl-accent); background: var(--kl-bg-subtle); }
.kl-byline { font-size: 14px; color: var(--kl-text-faint); margin-top: 18px; }
.kl-home-divider { margin: 40px 0; border: none; border-top: 1px solid var(--kl-border); }

/* Mobile */
.kl-menu-toggle { display: none; }
.kl-scrim { display: none; }

  pages: {
    sec1: `<p class="kl-lead">Welcome to the official documentation for KLOVER, the K-Culture Web3 ecosystem that lets fans around the world own, influence, and engage with the culture they love. This documentation explains what KLOVER is, how its ecosystem works, and how fans, partners, and supporters can take part.</p>
<h2 id="what">What is KLOVER?</h2>
<p>KLOVER is a Web3 ecosystem built to <strong>tokenize culture</strong>, beginning with Korean culture (K-POP, creators, and esports) and expanding worldwide. It connects K-Culture organizations with their global fanbases through <strong>Culture Tokens</strong>, digital assets that transform passive fandom into active participation and ownership. The entire ecosystem is built on the <strong>BASE</strong> blockchain.</p>
<h2 id="audience">Who This Documentation Is For</h2>
<p>This documentation serves three audiences:</p>
<ul>
<li><strong>Fans</strong> who want to own Culture Tokens, take part in decisions, and reach exclusive experiences.</li>
<li><strong>K-Culture organizations</strong> exploring how to bring their communities on-chain and launch a Culture Token.</li>
<li><strong>Partners and supporters</strong> who want to understand the ecosystem, the $KLVR token, and the vision behind it.</li>
</ul>
<p>You can read it from start to finish, or jump to the section most relevant to you.</p>
<h2 id="mission">Mission: Tokenize Culture</h2>
<p>Our mission is simple: <strong>Tokenize Culture.</strong> We believe fans are not merely spectators. They are co-creators of culture's value, and KLOVER gives that contribution a tangible form.</p>
<p>We start with Korean culture, and our vision is to expand to global culture, making KLOVER the home where any culture and its community can grow together.</p>
<h2 id="brand">The KLOVER Brand</h2>
<p>The KLOVER name unites two ideas. The <strong>clover</strong> is a universal symbol of luck, growth, and good fortune. <strong>"K-Lover"</strong> is the global community that loves K-Culture. Together they capture what KLOVER stands for: a flourishing home for the people who love culture and help it grow.</p>
<h2 id="life4cut">Life4Cut: The Organization Behind KLOVER</h2>
<p>KLOVER is founded and operated by <strong>Life4Cut</strong>, Korea's leading photobooth brand and a globally recognized name in K-Culture experiences. Life4Cut gives KLOVER deep cultural roots, brand trust, and direct connections across the K-Culture industry, a foundation few can match.</p>
<h2 id="terminology">Key Terminology</h2>
<p>A quick reference for the core terms used throughout this documentation:</p>
<div class="kl-dl">
<div class="row"><dt>KLOVER</dt><dd>The overall K-Culture Web3 ecosystem and its consumer platform.</dd></div>
<div class="row"><dt>$KLVR</dt><dd>The native token that powers the ecosystem and is used to acquire Culture Tokens.</dd></div>
<div class="row"><dt>Culture Token</dt><dd>A token issued by a K-Culture organization that unlocks utilities for its holders.</dd></div>
<div class="row"><dt>Culture Token Publisher</dt><dd>The organization (a label, MCN, or esports team) that issues a Culture Token.</dd></div>
<div class="row"><dt>Utility</dt><dd>A benefit unlocked by a Culture Token, such as voting or exclusive experiences.</dd></div>
<div class="row"><dt>BASE</dt><dd>The blockchain on which the KLOVER ecosystem is built.</dd></div>
<div class="row"><dt>Presale</dt><dd>The initial sale of a new Culture Token on the KLOVER Platform, before secondary trading begins.</dd></div>
<div class="row"><dt>Utility Hub</dt><dd>The area of the platform where holders use their Culture Tokens to vote and enter experiences.</dd></div>
<div class="row"><dt>Web3</dt><dd>The category of internet services built on public blockchains, where people can truly own digital assets.</dd></div>
</div>`,
    sec2: `<p class="kl-lead">K-Culture has become a global force, yet the relationship between fans and the culture they fuel still runs in only one direction. KLOVER exists to close that gap.</p>
<h2 id="phenomenon">K-Culture as a Global Phenomenon</h2>
<p>From music to film to gaming, Korean culture commands a massive and passionate global audience. K-Culture fandoms are among the most engaged, creative, and loyal communities in the world, driving trends and shaping markets far beyond Korea's borders.</p>
<h2 id="gap">The Fan Engagement Gap</h2>
<p>Today, fans express their devotion through streaming, merchandise, and attendance. Yet they have <strong>no real say</strong> in the culture they support, and <strong>no stake</strong> in the value they help create. Their passion is immense, but their participation is limited to consumption.</p>
<h2 id="economic-layer">The Missing Economic Layer</h2>
<p>Value flows <em>around</em> fans, not <em>through</em> them. The economic upside of fandom largely accrues to platforms and intermediaries, while the fans who generate that value are left on the outside. There is a missing economic layer connecting fans to the culture they power.</p>
<h2 id="why-kculture">Why Start with K-Culture</h2>
<p>K-Culture is the natural place to begin, for several reasons:</p>
<ul>
<li>Its fandoms are global, deeply engaged, and already active online.</li>
<li>Its organizations, such as labels and MCNs, last far longer than any single artist and serve many fans at once.</li>
<li>Its audiences adopt new platforms and formats quickly.</li>
<li>As the company behind KLOVER, Life4Cut holds direct relationships across the K-Culture industry.</li>
</ul>
<h2 id="who-benefits">Who Benefits</h2>
<ul>
<li><strong>Fans</strong> gain ownership, a voice in decisions, and access to experiences they could not reach before.</li>
<li><strong>Organizations</strong> gain a new way to engage their communities and a new source of revenue.</li>
<li><strong>The ecosystem</strong> grows stronger as every new community adds activity and demand.</li>
</ul>
<h2 id="why-web3">Why Web3, Why Now</h2>
<p>For the first time, blockchain makes it possible to give fans <strong>verifiable ownership</strong>, <strong>direct influence</strong>, and <strong>shared upside</strong>. KLOVER uses this technology not for speculation, but to turn fandom into genuine participation. The timing is right: K-Culture is global, and the infrastructure is finally ready.</p>`,
    sec3: `<p class="kl-lead">The KLOVER ecosystem is built on four connected pillars that work together to tokenize culture.</p>
<h2 id="architecture">Architecture Overview</h2>
<p>KLOVER links four elements into one seamless loop: the <strong>$KLVR token</strong> (the ecosystem's currency), <strong>Culture Tokens</strong> (the assets fans hold), the <strong>KLOVER Platform</strong> (where everything happens), and the <strong>fans</strong> who bring it all to life. Each reinforces the others.</p>
<h2 id="pillars">The Four Pillars</h2>
<div class="kl-cards">
<div class="kl-card"><div class="ic">01</div><div class="ct">$KLVR</div><div class="cd">The native token that powers the ecosystem and is required to acquire Culture Tokens.</div></div>
<div class="kl-card"><div class="ic">02</div><div class="ct">Culture Tokens</div><div class="cd">Tokens issued by K-Culture organizations that unlock real utilities for fans.</div></div>
<div class="kl-card"><div class="ic">03</div><div class="ct">The KLOVER Platform</div><div class="cd">The welcoming home for buying, trading, and using Culture Tokens.</div></div>
<div class="kl-card"><div class="ic">04</div><div class="ct">Fans</div><div class="cd">The global community whose ownership, participation, and energy give the ecosystem its value.</div></div>
</div>
<h2 id="how-it-works">How It Works, End to End</h2>
<p>A typical journey through the ecosystem looks like this:</p>
<ol>
<li>A fan acquires <strong>$KLVR</strong>, or deposits $KLVR or USDT into the platform.</li>
<li>They choose a <strong>Culture Token</strong> from an organization they support.</li>
<li>They join the token's <strong>presale</strong>, or buy it on the secondary market.</li>
<li>They use the token in the <strong>Utility Hub</strong> to vote and enter experiences.</li>
<li>They hold <strong>$KLVR</strong> to take part in ecosystem governance.</li>
</ol>
<h2 id="flywheel">The Economic Flywheel</h2>
<p>The ecosystem is designed as a self-reinforcing loop:</p>
<ul>
<li>Demand for Culture Tokens drives demand for <strong>$KLVR</strong>.</li>
<li>A thriving platform attracts more <strong>Culture Token Publishers</strong>.</li>
<li>More publishers attract more <strong>fans</strong>.</li>
<li>More fans deepen demand across the entire ecosystem.</li>
</ul>
<h2 id="base">Built on BASE</h2>
<p>KLOVER is built on <strong>BASE</strong>, a secure and dependable blockchain with the strength of Ethereum. We chose BASE for four reasons:</p>
<ul>
<li><strong>Low fees</strong> keep everyday actions affordable for fans.</li>
<li><strong>Fast transactions</strong> make the experience feel immediate.</li>
<li><strong>Strong security</strong> inherited from the Ethereum ecosystem.</li>
<li><strong>Wide compatibility</strong> with standard Web3 wallets and tools.</li>
</ul>
<p>The result is infrastructure smooth enough for fans who have never used crypto before.</p>`,

    sec5: `<p class="kl-lead">Culture Tokens are the assets that bring fans and K-Culture organizations together. Each one is issued by a cultural organization and unlocks real utilities for its holders.</p>
<h2 id="what-ct">What is a Culture Token?</h2>
<p>A <strong>Culture Token</strong> is a digital token issued by a K-Culture organization (a music label, an MCN, or an esports team) that represents membership in its community and unlocks exclusive utilities. Holding one is a direct connection to the culture you love.</p>
<h2 id="who">Who Can Issue a Culture Token</h2>
<p>Culture Tokens are issued by <strong>established cultural organizations</strong> rather than individuals. This ensures longevity and a broad utility surface: organizations outlast any single artist or season and can serve many fans across many projects. <em>(See <a data-nav="sec8" href="#sec8">Launching a Culture Token</a>.)</em></p>
<h2 id="utilities">Culture Token Utilities</h2>
<p>Culture Tokens unlock a growing range of utilities. Examples include:</p>
<ul>
<li><strong>Voting:</strong> Publishers invite fans to decide between options approved in advance, such as a single's cover art, a concert outfit, or the next profile picture. Fans shape real outcomes, within boundaries the publisher sets.</li>
<li><strong>Experiences:</strong> Raffles for dinners with artists, early access to concert tickets, priority for fan meetings, and more.</li>
<li><strong>Expanding Utilities:</strong> Utilities grow over time as publishers design new ways to reward their communities.</li>
</ul>
<div class="kl-hint info"><div class="h-ic"></div><div class="h-body">Voting is always curated by the publisher: fans choose among options the publisher has already approved.</div></div>
<h2 id="how-voting">How Voting Works</h2>
<p>Voting gives fans a real voice within clear boundaries:</p>
<ol>
<li>The publisher prepares a decision and a set of approved options.</li>
<li>Holders of the Culture Token cast their votes during a set window.</li>
<li>The result guides the publisher's final choice.</li>
</ol>
<p>Because the options are set in advance, voting stays meaningful and on brand.</p>
<h2 id="lifecycle">The Culture Token Lifecycle</h2>
<ul>
<li><strong>Presale:</strong> Initial distribution on the KLOVER Platform.</li>
<li><strong>Secondary Trading:</strong> Fans trade tokens within the platform's integrated marketplace.</li>
<li><strong>Ongoing Utility:</strong> Holders access voting, experiences, and other utilities continuously.</li>
</ul>
<h2 id="ct-klover">Culture Tokens and $KLVR</h2>
<p>Culture Tokens and $KLVR work together. $KLVR is the currency of the ecosystem, and every Culture Token is acquired with $KLVR. A Culture Token then carries the utilities of a single publisher, while $KLVR carries value and governance across the whole ecosystem.</p>
<h2 id="value">The Value of Holding</h2>
<p>Holding a Culture Token means <strong>belonging</strong>. It is a direct line to influence, exclusive access, and a shared stake in a publisher's cultural journey, turning everyday fandom into membership.</p>`,
    sec6: `<p class="kl-lead">The KLOVER Platform is the home of the ecosystem, designed so that anyone, not just crypto experts, can take part.</p>

    sec7: `<p class="kl-lead">KLOVER gives its community a voice. Through ecosystem governance, $KLVR holders help steer the direction of the ecosystem.</p>
<h2 id="gov-philosophy">Governance Philosophy</h2>
<p>Governance at KLOVER is <strong>curated by the team and decided by the community</strong>. The KLOVER team raises matters for a vote, and $KLVR holders decide the outcome. This keeps proposals relevant and actionable while putting real decisions in the community's hands.</p>
<h2 id="how">How Ecosystem Governance Works</h2>
<ol>
<li>The <strong>KLOVER team</strong> submits a proposal.</li>
<li><strong>$KLVR holders</strong> vote, with voting weight based on their holdings.</li>
<li>The outcome is <strong>implemented</strong> by the team.</li>
</ol>
<h2 id="voting-power">How Voting Power Works</h2>
<p>Voting weight is based on the amount of $KLVR a holder commits to a vote. The more $KLVR you hold, the more weight your vote carries. The exact method, including any limits or lockups, is <span class="kl-tbd">Needs to be decided</span>.</p>
<h2 id="examples">Examples of Governance Decisions</h2>
<p>Governance focuses on matters that affect the wider ecosystem. Examples may include:</p>
<ul>
<li>Priorities for new features and utilities.</li>
<li>Direction for ecosystem programs and initiatives.</li>
<li>Selected parameters that shape how the ecosystem runs.</li>
</ul>
<h2 id="scope">Scope of Ecosystem Governance</h2>
<p>Ecosystem governance covers matters at the ecosystem level that the team raises, including direction, priorities, and initiatives that affect the broader KLOVER community. The precise scope of governable decisions is <span class="kl-tbd">Needs to be decided</span>.</p>
<h2 id="vs">Ecosystem Governance vs. Culture Token Voting</h2>
<div class="kl-hint accent"><div class="h-ic"></div><div class="h-body">KLOVER has <strong>two distinct voting systems</strong>. Do not confuse them.</div></div>
<div class="kl-dl">
<div class="row"><dt>Ecosystem Governance</dt><dd>Uses <strong>$KLVR</strong>. Decides matters at the ecosystem level across all of KLOVER.</dd></div>
<div class="row"><dt>Culture Token Voting</dt><dd>Uses a specific <strong>Culture Token</strong>. Decides matters within a single publisher's community (e.g. an album cover).</dd></div>
</div>`,
    sec8: `<p class="kl-lead">KLOVER partners with established K-Culture organizations to bring their communities on-chain. This is a broad overview for prospective partners.</p>
<h2 id="who-partner">Who Should Partner with KLOVER?</h2>
<p>KLOVER is designed for organizations with a <strong>passionate global fanbase</strong> and a <strong>lasting presence</strong> in K-Culture. Because Culture Tokens are issued by organizations rather than individuals, partners can offer enduring value across many artists, creators, and projects.</p>
<h2 id="categories">Eligible Partner Categories</h2>
<ul>
<li><strong>K-POP Entertainment Companies</strong></li>
<li><strong>Korean YouTube MCN Companies</strong></li>
<li><strong>Korean Esports Organizations</strong></li>
</ul>
<p>…and other established K-Culture organizations with a global following.</p>
<h2 id="eligibility">Eligibility</h2>
<p>KLOVER looks for partners that can offer lasting value to a community. Typical signals include a global following, an active fanbase, and a track record in K-Culture. Full eligibility criteria are <span class="kl-tbd">Needs to be decided</span> and are confirmed during review.</p>
<h2 id="receive">What Partners Receive</h2>
<ul>
<li>A complete platform and infrastructure, so there is no need to build Web3 internally.</li>
<li>Access to a global community of culture fans.</li>
<li>Tools for utilities (voting, experiences) and governance.</li>
<li>A new channel for fan engagement and revenue.</li>
</ul>
<h2 id="process">The Launch Process</h2>
<p>At a high level, launching a Culture Token follows these stages:</p>
<ol>
<li><strong>Inquiry.</strong> The organization reaches out to the KLOVER team.</li>
<li><strong>Review.</strong> Both sides confirm fit, goals, and eligibility.</li>
<li><strong>Design.</strong> The token, its utilities, and its launch plan are shaped together.</li>
<li><strong>Presale.</strong> The Culture Token is offered to fans on the platform.</li>
<li><strong>Launch.</strong> Trading and utilities go live, and the community grows from there.</li>
</ol>
<h2 id="revenue">Revenue Model for Partners</h2>
<p>Partners can generate revenue from their Culture Token's presale and from ongoing platform activity. Specific terms and revenue share structures are <span class="kl-tbd">Needs to be decided</span> and are tailored to each partner during onboarding.</p>
<h2 id="inquiry">Partner Inquiry &amp; Next Steps</h2>
<p>Organizations interested in launching a Culture Token are invited to reach out to the KLOVER team. Official partnership contact details are:</p>
<div class="kl-soon"><span class="kl-soon-badge">Coming Soon</span><span class="kl-soon-sub">Partnership contact information will be published here.</span></div>`,
    sec9: `<p class="kl-lead">Here's how we get from where we are today to a world where any culture can be tokenized. The phases below lay out the full journey, from building core infrastructure to expanding well beyond K-Culture. Target timelines are <span class="kl-tbd">Needs to be decided</span> and will be shared as we get closer to each phase.</p>
<div class="kl-timeline">
<div class="kl-tl-item"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 1</div><h2 id="phase-1" class="kl-tl-title">Foundation</h2><div class="kl-tl-body">We're building the technical backbone that everything else runs on. This covers deploying $KLVR and the Culture Token smart contracts on BASE, developing the KLOVER Platform, and putting the security and compliance groundwork in place. The work happening here may be invisible to most people right now, but it's what makes everything that follows possible.</div></div>

<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 6</div><h2 id="phase-6" class="kl-tl-title">First Culture Tokens</h2><div class="kl-tl-body">We onboard the first wave of K-Culture publishers and launch their Culture Tokens on the platform. Fans join presales, acquire their first tokens, and start accessing real utilities. These inaugural communities set the tone for what KLOVER can be, and we're choosing our first partners carefully to make sure the start is strong.</div></div>

    sec2: `<p class="kl-lead">K-컬처는 이미 글로벌 현상. 그런데 팬과 그들이 키워낸 문화 사이의 관계는 여전히 한 방향. KLOVER는 그 간극을 메우려고 존재.</p>

<h2 id="economic-layer">빠져 있는 경제적 레이어</h2>

</ol>
<h2 id="flywheel">경제적 플라이휠</h2>
<p>생태계는 스스로를 강화하는 루프로 설계:</p>
<ul>
<li>컬처 토큰 수요가 <strong>$KLVR</strong> 수요를 끌어올린다.</li>
<li>활발한 플랫폼이 더 많은 <strong>컬처 토큰 발행사</strong>를 부른다.</li>
<li>발행사가 늘면 <strong>팬</strong>이 늘어난다.</li>
<li>팬이 늘면 생태계 전반의 수요가 깊어진다.</li>
</ul>
<h2 id="base">BASE 기반</h2>
<p>KLOVER는 이더리움급 보안을 갖춘 안전하고 믿을 만한 블록체인 <strong>BASE</strong> 위에 올라간다. BASE를 택한 이유는 네 가지:</p>
<ul>
<li><strong>낮은 수수료</strong>. 일상적인 행동을 팬에게 부담 없이.</li>
<li><strong>빠른 처리</strong>. 거의 즉각적으로 느껴지는 경험.</li>
<li><strong>강력한 보안</strong>. 이더리움에서 그대로 이어받은 안정성.</li>
<li><strong>넓은 호환성</strong>. 표준 Web3 지갑과 도구에 그대로.</li>
</ul>
<p>크립토를 한 번도 써본 적 없는 팬에게도 매끄럽게 돌아가는 인프라.</p>`,
    sec4: `<p class="kl-lead">$KLVR는 생태계 한가운데 자리한 기축 토큰. 모든 가치가 흐르는 통로.</p>
<h2 id="role">$KLVR의 역할</h2>
<p>$KLVR는 생태계 전체의 교환 수단. 컬처 토큰을 사는 데 반드시 쓰이고, 플랫폼 거래에 사용되며, 홀더에게 생태계 거버넌스 발언권을 준다. KLOVER 안에서 가치가 움직이는 곳에는 늘 $KLVR.</p>
<h2 id="utility">토큰 유틸리티</h2>
<ul>
<li><strong>컬처 토큰 구매:</strong> 컬처 토큰은 오직 $KLVR로만 살 수 있고, 이것이 꾸준하고 구조적인 수요를 만든다.</li>
<li><strong>거버넌스:</strong> $KLVR 홀더는 KLOVER 팀이 올린 안건에 투표.</li>
<li><strong>플랫폼 통화:</strong> $KLVR가 플랫폼 전반의 거래와 활동을 매개.</li>
</ul>
<h2 id="demand">수요의 원천</h2>
<p>$KLVR 수요는 투기만이 아니라 생태계 안의 실제 사용에서 나온다:</p>
<ul>
<li><strong>컬처 토큰 구매</strong>. 모든 컬처 토큰을 $KLVR로 사기 때문.</li>
<li><strong>플랫폼 활동</strong>. 거래가 생태계 자체 토큰으로 정산되기 때문.</li>
<li><strong>거버넌스</strong>. $KLVR 보유가 곧 의사결정 발언권이기 때문.</li>
</ul>
<h2 id="standard">토큰 표준</h2>
<p>$KLVR는 BASE 블록체인에 배포된 ERC-20 토큰. 표준 Web3 지갑과 도구에 그대로 호환. 공식 컨트랙트 주소는 <span class="kl-tbd">미정</span>, 런칭 전에 이곳에 공개.</p>
<h2 id="tokenomics">토크노믹스</h2>
<p>총발행량, 배분, 베스팅 일정, 발행과 소각 메커니즘 등 상세 토크노믹스는 막바지 정리 중.</p>
<div class="kl-soon"><span class="kl-soon-badge">준비 중</span><span class="kl-soon-sub">전체 토크노믹스는 이곳에 공개.</span></div>
<h2 id="acquire">$KLVR 확보 방법</h2>
<p>팬은 KLOVER 플랫폼에서 바로 $KLVR를 확보. 입문자를 위한 간단한 온보딩 경험으로 설계. 지원하는 확보 수단과 이용 범위는 <span class="kl-tbd">미정</span>.</p>`,
    sec5: `<p class="kl-lead">컬처 토큰은 팬과 K-컬처 발행사를 잇는 자산. 하나하나가 문화 조직이 발행하고, 홀더에게 실제 유틸리티를 연다.</p>
<h2 id="what-ct">컬처 토큰이란</h2>
<p><strong>컬처 토큰</strong>은 K-컬처 발행사, 즉 음악 레이블이나 MCN, 이스포츠 팀이 발행하는 디지털 토큰. 그 커뮤니티의 멤버십을 증명하고 독점 유틸리티를 연다. 한 장을 쥐는 것은 사랑하는 문화와의 직접 연결.</p>
<h2 id="who">누가 컬처 토큰을 발행하나</h2>
<p>컬처 토큰은 개인이 아니라 <strong>자리 잡은 문화 조직</strong>이 발행. 그래야 수명이 길고 유틸리티의 폭도 넓다. 조직은 아티스트 한 명이나 한 시즌보다 오래 가고, 여러 프로젝트에 걸쳐 많은 팬을 품기 때문. <em>(자세한 내용은 <a data-nav="sec8" href="#sec8">컬처 토큰 런칭</a> 참고.)</em></p>
<h2 id="utilities">컬처 토큰 유틸리티</h2>
<p>컬처 토큰은 점점 넓어지는 유틸리티를 연다. 예를 들면:</p>
<ul>
<li><strong>투표:</strong> 발행사가 미리 승인한 선택지 안에서 팬이 결정. 다음 싱글 커버 아트, 콘서트 의상, 새 프로필 사진 같은 것. 발행사가 정한 울타리 안에서, 팬이 실제 결과를 빚는다.</li>
<li><strong>경험:</strong> 아티스트와의 식사 추첨, 콘서트 티켓 우선 구매, 팬미팅 우선권 등.</li>
<li><strong>확장되는 유틸리티:</strong> 발행사가 커뮤니티에 보답하는 새 방식을 설계하면서 유틸리티도 계속 늘어난다.</li>
</ul>
<div class="kl-hint info"><div class="h-ic"></div><div class="h-body">투표는 늘 발행사가 큐레이션. 팬은 발행사가 이미 승인한 선택지 안에서 고른다.</div></div>
<h2 id="how-voting">투표는 어떻게 굴러가나</h2>
<p>투표는 분명한 울타리 안에서 팬에게 진짜 발언권을 준다:</p>
<ol>
<li>발행사가 안건과 승인된 선택지를 준비.</li>
<li>컬처 토큰 홀더가 정해진 기간 동안 투표.</li>
<li>그 결과가 발행사의 최종 결정을 이끈다.</li>
</ol>
<p>선택지를 미리 정해두기에 투표는 늘 의미 있고 브랜드에 어긋나지 않는다.</p>
<h2 id="lifecycle">컬처 토큰의 라이프사이클</h2>
<ul>
<li><strong>프리세일:</strong> KLOVER 플랫폼에서의 최초 배분.</li>
<li><strong>2차 거래:</strong> 플랫폼에 내장된 마켓플레이스에서 팬끼리 거래.</li>
<li><strong>지속 유틸리티:</strong> 홀더는 투표와 경험, 그 밖의 유틸리티를 꾸준히 사용.</li>
</ul>
<h2 id="ct-klover">컬처 토큰과 $KLVR</h2>
<p>컬처 토큰과 $KLVR는 함께 움직인다. $KLVR는 생태계의 기축 토큰이고, 모든 컬처 토큰은 $KLVR로 산다. 컬처 토큰은 한 발행사의 유틸리티를 담고, $KLVR는 생태계 전체의 가치와 거버넌스를 담는다.</p>
<h2 id="value">보유의 가치</h2>
<p>컬처 토큰을 쥔다는 것은 곧 <strong>소속</strong>. 영향력에 곧장 닿는 통로이자 남들은 못 누리는 접근권, 그리고 한 발행사의 문화적 여정에 함께 거는 지분. 일상의 팬심이 멤버십이 되는 순간.</p>`,
    sec6: `<p class="kl-lead">KLOVER 플랫폼은 생태계의 집. 크립토 전문가가 아니어도 누구나 참여하도록 설계.</p>
<h2 id="philosophy">플랫폼 철학: 장벽 없는 Web3</h2>
<p>KLOVER는 <strong>팬 우선</strong>으로 만든다. 플랫폼은 블록체인의 복잡함을 익숙하고 직관적인 경험 뒤로 감춘다. $KLVR나 USDT를 입금할 수 있다면 누구나 온전히 참여. <strong>크립토 경험은 필요 없다.</strong></p>
<h2 id="newcomers">입문자를 위한 설계</h2>
<p>대부분의 팬은 크립토 전문가가 아니고, 그럴 필요도 없다. 플랫폼은 익숙한 허들을 걷어낸다:</p>
<ul>
<li>지갑이나 가스, 개인키를 몰라도 시작 가능.</li>
<li>트레이딩 터미널이 아니라 일반 앱에 가까운 익숙한 화면.</li>
<li>컬처 토큰을 사고 보유하고 쓰는 분명한 단계.</li>
</ul>
<h2 id="getting-started">시작하기</h2>
<p>몇 단계면 충분:</p>
<ol><li>KLOVER 계정 생성.</li><li><strong>$KLVR</strong>나 <strong>USDT</strong> 입금.</li><li>컬처 토큰 프리세일에 참여하고, 거래하고, 유틸리티 사용.</li></ol>
<h2 id="deposits">입금과 출금</h2>
<p>계정은 <strong>$KLVR</strong>나 <strong>USDT</strong>로 충전. 충전을 마치면 프리세일에 참여하고, 컬처 토큰을 거래하고, 유틸리티를 쓸 수 있다. 지원 네트워크와 전체 입출금 옵션은 <span class="kl-tbd">미정</span>.</p>
<h2 id="features">플랫폼 기능</h2>
<ul>
<li><strong>컬처 토큰 프리세일:</strong> 새로 런칭하는 컬처 토큰을 가장 먼저 확보.</li>
<li><strong>거래:</strong> 내장 마켓플레이스에서 컬처 토큰 매매.</li>
<li><strong>유틸리티 허브:</strong> 투표하고, 추첨과 경험에 참여하는 모든 것을 한곳에서.</li>
</ul>
<h2 id="fees">수수료 구조</h2>
<p>KLOVER는 거래 같은 플랫폼 활동에 붙는 투명한 수수료로 생태계를 지탱. 정확한 요율은 <span class="kl-tbd">미정</span>, 전체 표는 런칭 전에 공개.</p>
<h2 id="security">인프라와 보안</h2>
<p><strong>BASE</strong> 위에 올라간 플랫폼은 블록체인 수준의 보안에, 대중 사용자를 위한 커스터디와 온보딩 경험을 더한다. 팬은 탈중앙 인프라의 안전함을 일반 앱의 편안함과 함께 누린다.</p>`,
    sec7: `<p class="kl-lead">KLOVER는 커뮤니티에 목소리를 준다. 생태계 거버넌스를 통해 $KLVR 홀더가 생태계의 방향을 함께 잡는다.</p>
<h2 id="gov-philosophy">거버넌스 철학</h2>
<p>KLOVER의 거버넌스는 <strong>팀이 큐레이션하고 커뮤니티가 결정</strong>하는 구조. KLOVER 팀이 안건을 올리고, $KLVR 홀더가 결과를 정한다. 덕분에 안건은 늘 현실적이고 실행 가능하면서, 진짜 결정은 커뮤니티 손에.</p>
<h2 id="how">생태계 거버넌스가 굴러가는 방식</h2>
<ol>
<li><strong>KLOVER 팀</strong>이 안건을 제출.</li>
<li><strong>$KLVR 홀더</strong>가 보유량에 따른 가중치로 투표.</li>
<li>그 결과를 팀이 <strong>실행</strong>.</li>
</ol>
<h2 id="voting-power">투표 가중치</h2>
<p>투표 가중치는 홀더가 투표에 실은 $KLVR 양에 따라 정해진다. $KLVR를 많이 쥘수록 표의 무게도 커진다. 한도나 락업을 포함한 정확한 방식은 <span class="kl-tbd">미정</span>.</p>
<h2 id="examples">거버넌스로 정하는 것들</h2>
<p>거버넌스는 생태계 전반에 영향을 주는 사안에 집중. 예를 들면:</p>
<ul>
<li>새 기능과 유틸리티의 우선순위.</li>
<li>생태계 프로그램과 이니셔티브의 방향.</li>
<li>생태계 운영을 좌우하는 일부 파라미터.</li>
</ul>
<h2 id="scope">거버넌스의 범위</h2>
<p>생태계 거버넌스는 팀이 올리는 생태계 차원의 사안, 즉 더 넓은 KLOVER 커뮤니티에 영향을 주는 방향과 우선순위, 이니셔티브를 다룬다. 투표로 정할 수 있는 사안의 정확한 범위는 <span class="kl-tbd">미정</span>.</p>
<h2 id="vs">생태계 거버넌스 vs 컬처 토큰 투표</h2>
<div class="kl-hint accent"><div class="h-ic"></div><div class="h-body">KLOVER에는 <strong>전혀 다른 두 개의 투표 체계</strong>. 헷갈리지 말 것.</div></div>
<div class="kl-dl">
<div class="row"><dt>생태계 거버넌스</dt><dd><strong>$KLVR</strong>로 진행. KLOVER 전체에 걸친 생태계 차원의 사안을 결정.</dd></div>
<div class="row"><dt>컬처 토큰 투표</dt><dd>특정 <strong>컬처 토큰</strong>으로 진행. 한 발행사 커뮤니티 안의 사안을 결정. 예를 들면 앨범 커버.</dd></div>
</div>`,
    sec8: `<p class="kl-lead">KLOVER는 자리 잡은 K-컬처 조직과 손잡고 그 커뮤니티를 온체인으로 가져온다. 잠재 파트너를 위한 큰 그림.</p>
<h2 id="who-partner">어떤 조직이 KLOVER와 맞나</h2>
<p>KLOVER는 <strong>열성적인 글로벌 팬층</strong>과 K-컬처에서의 <strong>오랜 존재감</strong>을 가진 조직을 위한 곳. 컬처 토큰을 개인이 아니라 조직이 발행하기에, 파트너는 여러 아티스트와 크리에이터, 프로젝트에 걸쳐 오래가는 가치를 줄 수 있다.</p>
<h2 id="categories">참여 가능한 파트너 유형</h2>
<ul>
<li><strong>K-POP 엔터테인먼트 기업</strong></li>
<li><strong>한국 유튜브 MCN 기업</strong></li>
<li><strong>한국 이스포츠 조직</strong></li>
</ul>
<p>그리고 글로벌 팬층을 가진 그 밖의 자리 잡은 K-컬처 조직.</p>
<h2 id="eligibility">자격</h2>
<p>KLOVER는 커뮤니티에 오래가는 가치를 줄 수 있는 파트너를 찾는다. 보통은 글로벌 팬층, 활발한 팬덤, K-컬처에서의 트랙 레코드가 신호. 전체 자격 기준은 <span class="kl-tbd">미정</span>, 심사 과정에서 확정.</p>
<h2 id="receive">파트너가 얻는 것</h2>
<ul>
<li>완성된 플랫폼과 인프라. Web3를 내부에서 직접 만들 필요가 없다.</li>
<li>전 세계 문화 팬 커뮤니티로의 접근.</li>
<li>투표와 경험 같은 유틸리티, 그리고 거버넌스를 위한 도구.</li>
<li>팬과의 새로운 접점, 그리고 새 수익원.</li>
</ul>
<h2 id="process">런칭 과정</h2>
<p>큰 틀에서 컬처 토큰 런칭은 다음 단계를 거친다:</p>
<ol>
<li><strong>문의.</strong> 조직이 KLOVER 팀에 연락.</li>
<li><strong>검토.</strong> 양측이 핏과 목표, 자격을 확인.</li>
<li><strong>설계.</strong> 토큰과 유틸리티, 런칭 플랜을 함께 다듬는다.</li>
<li><strong>프리세일.</strong> 컬처 토큰을 플랫폼에서 팬에게 공개.</li>
<li><strong>런칭.</strong> 거래와 유틸리티가 라이브되고, 커뮤니티가 거기서부터 자라난다.</li>
</ol>
<h2 id="revenue">파트너 수익 모델</h2>
<p>파트너는 컬처 토큰 프리세일과 이후의 플랫폼 활동에서 수익을 낸다. 구체적인 조건과 수익 배분 구조는 <span class="kl-tbd">미정</span>, 온보딩 과정에서 파트너별로 맞춘다.</p>
<h2 id="inquiry">파트너 문의와 다음 단계</h2>
<p>컬처 토큰 런칭에 관심 있는 조직은 KLOVER 팀에 연락. 공식 파트너십 연락처:</p>
<div class="kl-soon"><span class="kl-soon-badge">준비 중</span><span class="kl-soon-sub">파트너십 연락처는 이곳에 공개.</span></div>`,
    sec9: `<p class="kl-lead">지금 이 자리에서 어떤 문화든 토큰화되는 세상까지, 어떻게 갈지에 대한 그림. 아래 단계들은 핵심 인프라 구축부터 K-컬처를 한참 넘어서는 확장까지, 전체 여정을 펼친 것. 목표 시점은 <span class="kl-tbd">미정</span>, 각 단계에 가까워질 때마다 공유.</p>
<div class="kl-timeline">
<div class="kl-tl-item"><div class="kl-tl-dot"></div><div class="kl-tl-phase">1단계</div><h2 id="phase-1" class="kl-tl-title">기반 구축</h2><div class="kl-tl-body">모든 것이 올라갈 기술적 뼈대를 만드는 단계. $KLVR와 컬처 토큰 스마트 컨트랙트를 BASE에 배포하고, KLOVER 플랫폼을 개발하고, 보안과 컴플라이언스의 토대를 다진다. 지금은 대부분의 눈에 보이지 않는 작업이지만, 뒤에 오는 모든 것을 가능하게 만드는 단계.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">2단계</div><h2 id="phase-2" class="kl-tl-title">Bloom 캠페인</h2><div class="kl-tl-body">토큰이 라이브되기 전, Bloom을 통해 커뮤니티에 먼저 문을 연다. Bloom은 KLOVER의 초기 커뮤니티 프로그램. 참여자는 의미 있는 방식으로 생태계에 기여하고 Bloom 포인트를 모으며, 이 포인트는 런칭 시 $KLVR 리워드로 전환. 세상이 다 들어오기 전에 미리 자기 지분을 쌓는 가장 빠른 길. 그저 빠른 게 중요한 게 아니라, 일찍 믿어준 사람을 기억하는 방식이 Bloom.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">3단계</div><h2 id="phase-3" class="kl-tl-title">$KLVR VIP 프리세일</h2><div class="kl-tl-body">$KLVR를 손에 쥐는 첫 번째 진짜 기회. 이 프리세일은 화이트리스트 참여자, 즉 Bloom 캠페인 기여자와 검증된 커뮤니티 멤버에게만 열린다. 퍼블릭 런칭 전의 제한된 창이고, 배정 물량은 심사 과정에서 확정. Bloom에 함께했다면, 일찍 나선 것에 대한 보상.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">4단계</div><h2 id="phase-4" class="kl-tl-title">$KLVR 런칭</h2><div class="kl-tl-body">$KLVR가 전 세계에 공개되는 순간. 런칭은 KLOVER가 본격적으로 문을 열었다는 공개 선언. 생태계가 공식적으로 열리고, 앞선 단계에서 쌓아온 인프라가 본격 가동되며, 여기서부터 모든 것이 빨라진다.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">5단계</div><h2 id="phase-5" class="kl-tl-title">KLOVER 플랫폼</h2><div class="kl-tl-body">$KLVR가 라이브된 뒤 KLOVER 플랫폼이 모두에게 열린다. 팬은 계정을 만들고, $KLVR나 USDT를 입금하고, 컬처 토큰 프리세일에 참여. 유틸리티 허브가 열려 홀더는 투표하고, 경험에 참여하고, 아끼는 커뮤니티와 교감. KLOVER가 개념을 넘어 매일 쓰는 무언가가 되는 지점.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">6단계</div><h2 id="phase-6" class="kl-tl-title">첫 컬처 토큰</h2><div class="kl-tl-body">첫 K-컬처 발행사들을 온보딩하고, 그들의 컬처 토큰을 플랫폼에 런칭. 팬은 프리세일에 참여해 첫 토큰을 손에 넣고, 실제 유틸리티를 쓰기 시작. 이 초기 커뮤니티들이 KLOVER의 분위기를 좌우하는 만큼, 첫 파트너는 신중하게 고른다.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">7단계</div><h2 id="phase-7" class="kl-tl-title">생태계 확장</h2><div class="kl-tl-body">토대가 검증된 뒤엔 성장. K-POP, MCN, 이스포츠 전반에서 더 많은 발행사가 합류. 발행사들이 자기 커뮤니티가 무엇에 반응하는지 익히면서 유틸리티의 폭도 넓어진다. 네트워크 효과가 작동하고, 새 커뮤니티 하나하나가 이미 들어와 있는 모두에게 플랫폼을 더 단단하게 만든다.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">비전</div><h2 id="vision" class="kl-tl-title">K-컬처를 넘어</h2><div class="kl-tl-body">K-컬처를 위해 만든 모델이 거기서 멈출 이유는 없다. 플레이북이 검증되면 KLOVER는 전 세계 문화를 토큰화하는 방향으로 확장. 열정적인 글로벌 커뮤니티라면, 한 조각 소유할 가치가 있는 문화라면, 모두 이곳에. 비전은 단순. <strong>문화를 토큰화</strong>. 전부 다.</div></div>
</div>`,
    sec10: `<p class="kl-lead">KLOVER는 컴플라이언스를 핵심에 두고 운영. 아래 내용을 꼼꼼히 확인할 것.</p>

/* ============================================================
   APPLICATION ENGINE
   ============================================================ */
(function () {
  'use strict';
  const LS_LANG = 'klover-lang', LS_THEME = 'klover-theme';
  function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
  function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  let lang = lsGet(LS_LANG) || 'en';
  if (!LANGS.some(l => l.code === lang)) lang = 'en';

  function pack() { return I18N[lang] || I18N.en; }
  function deepGet(obj, path) { return path.split('.').reduce((o, k) => (o == null ? undefined : o[k]), obj); }
  function t(path) { const v = deepGet(pack(), path); return (v !== undefined && v !== null) ? v : deepGet(I18N.en, path); }
  function navLabel(id) { return (pack().nav && pack().nav[id]) || I18N.en.nav[id] || id; }
  function pageHtml(id) { const p = pack().pages || {}; return (p[id] !== undefined) ? p[id] : (I18N.en.pages[id] || ''); }
  function homeData() { const en = I18N.en.home, h = pack().home || {}; const m = Object.assign({}, en, h); if (!h.cards || !h.cards.length) m.cards = en.cards; return m; }

  const el = {
    nav: document.getElementById('nav'),
    content: document.getElementById('content'),
    breadcrumb: document.getElementById('breadcrumb'),
    pageFooter: document.getElementById('pageFooter'),
    pager: document.getElementById('pager'),
    toc: document.getElementById('toc'),
    langBtn: document.getElementById('langBtn'),
    langMenu: document.getElementById('langMenu'),
    langCurrent: document.getElementById('langCurrent'),
    langDropdown: document.getElementById('langDropdown'),
    search: document.getElementById('searchInput'),
    searchResults: document.getElementById('searchResults'),
    themeToggle: document.getElementById('themeToggle'),
    iconSun: document.getElementById('iconSun'),
    iconMoon: document.getElementById('iconMoon'),
    menuToggle: document.getElementById('menuToggle'),
    scrim: document.getElementById('scrim'),
  };
  let current = parseRoute();
  lang = current.lang || lang; KL_LANG = lang;

  /* ---------- THEME ---------- */
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    el.iconSun.style.display = theme === 'dark' ? 'none' : 'block';
    el.iconMoon.style.display = theme === 'dark' ? 'block' : 'none';
    lsSet(LS_THEME, theme);
  }
  (function initTheme() {
    let theme = lsGet(LS_THEME);
    if (!theme) theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    applyTheme(theme);
  })();
  el.themeToggle.addEventListener('click', () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

  /* ---------- LANGUAGE ---------- */
  function buildLangMenu() {
    el.langMenu.innerHTML = '';
    LANGS.forEach(l => {
      const opt = document.createElement('div');
      opt.className = 'kl-lang-opt' + (l.code === lang ? ' active' : '');
      opt.setAttribute('role', 'menuitem');
      opt.innerHTML = '<span class="native">' + l.native + '</span><span class="en-name">' + l.en + '</span>' +
        '<span class="check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></span>';
      opt.tabIndex = 0;
      const choose = () => {
        closeLangMenu();
        if (SUPPORTED_LANGS.indexOf(l.code) !== -1) { setLang(l.code); el.langBtn.focus(); }
        else { showComingSoon(l.code); }
      };
      opt.addEventListener('click', choose);
      opt.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); } });
      el.langMenu.appendChild(opt);
    });
  }
  function setLang(code) {
    lang = code; KL_LANG = code;
    lsSet(LS_LANG, code);
    document.documentElement.setAttribute('lang', code);
    const meta = LANGS.find(l => l.code === code);
    el.langCurrent.textContent = meta ? meta.native : 'English';
    history.replaceState({ section: current.section }, '', sectionToPath(current.section));
    applyStaticI18n(); buildLangMenu(); renderNav(); renderPage(current, false);
  }
  function openLangMenu() { el.langDropdown.classList.add('open'); el.langBtn.setAttribute('aria-expanded', 'true'); const f = el.langMenu.querySelector('.kl-lang-opt'); if (f) f.focus(); }
  function closeLangMenu() { el.langDropdown.classList.remove('open'); el.langBtn.setAttribute('aria-expanded', 'false'); }
  el.langBtn.addEventListener('click', (e) => { e.stopPropagation(); el.langDropdown.classList.contains('open') ? closeLangMenu() : openLangMenu(); });
  document.addEventListener('click', (e) => { if (!el.langDropdown.contains(e.target)) closeLangMenu(); });
  function applyStaticI18n() {
    document.querySelectorAll('[data-i18n]').forEach(node => { node.textContent = t(node.getAttribute('data-i18n')); });
    el.search.setAttribute('placeholder', t('ui.searchPlaceholder'));
    el.search.setAttribute('aria-label', t('ui.searchPlaceholder'));
  }

  /* ---------- COMING SOON MODAL ---------- */
  let modalEl = null;
  function buildModal() {
    modalEl = document.createElement('div');
    modalEl.className = 'kl-modal';
    modalEl.innerHTML = '<div class="kl-modal-scrim"></div><div class="kl-modal-card" role="dialog" aria-modal="true"><div class="kl-modal-lang"></div><div class="kl-modal-title"></div><div class="kl-modal-sub"></div><button class="kl-modal-close" type="button"></button></div>';
    document.body.appendChild(modalEl);
    modalEl.querySelector('.kl-modal-scrim').addEventListener('click', closeModal);
    modalEl.querySelector('.kl-modal-close').addEventListener('click', closeModal);
  }
  function showComingSoon(code) {
    const c = COMING_SOON[code];
    if (!c) return;
    if (!modalEl) buildModal();
    modalEl.querySelector('.kl-modal-lang').textContent = c.native;
    modalEl.querySelector('.kl-modal-title').textContent = c.title;
    modalEl.querySelector('.kl-modal-sub').textContent = c.sub;
    const card = modalEl.querySelector('.kl-modal-card');
    card.setAttribute('lang', code);
    modalEl.querySelector('.kl-modal-close').textContent = c.close;
    modalEl.classList.add('open');
    modalEl.querySelector('.kl-modal-close').focus();
  }
  function closeModal() {
    if (modalEl) modalEl.classList.remove('open');
    if (el.langBtn) el.langBtn.focus();
  }

  /* ---------- NAV ---------- */
  function renderNav() {
    el.nav.innerHTML = '';
    NAV_GROUPS.forEach(group => {
      const g = document.createElement('div');
      g.className = 'kl-nav-group';
      if (group.label) {
        const gl = document.createElement('div');
        gl.className = 'kl-nav-group-label';
        gl.textContent = t(group.label);
        g.appendChild(gl);
      }
      group.items.forEach(id => {
        const link = document.createElement('a');
        link.className = 'kl-nav-link' + (id === current.section ? ' active' : '');
        link.href = sectionToPath(id);
        link.setAttribute('data-nav', id);
        link.innerHTML = '<span class="ico" aria-hidden="true">' + (ICONS[id] || '•') + '</span><span>' + navLabel(id) + '</span>';
        g.appendChild(link);
      });
      el.nav.appendChild(g);
    });
  }

  /* ---------- ROUTER ---------- */
  function parseRoute() {
    let path = window.location.pathname.slice(BASE.length) || '/';
    if (!path.startsWith('/')) path = '/' + path;
    let routeLang = 'en';
    if (path === '/kor' || path.indexOf('/kor/') === 0) { routeLang = 'ko'; path = path.slice(4) || '/'; }
    if (path !== '/' && path.endsWith('/')) path = path.slice(0, -1);
    return { section: PATH_TO_ID[path] || 'home', lang: routeLang };
  }
  function navigate(id) {
    history.pushState({ section: id }, '', sectionToPath(id));
    current = { section: id };
    renderPage(current, false);
    renderNav();
  }
  window.addEventListener('popstate', () => {
    current = parseRoute();
    if (current.lang !== lang) {
      lang = current.lang; KL_LANG = lang;
      document.documentElement.setAttribute('lang', lang);
      const meta = LANGS.find(l => l.code === lang);
      el.langCurrent.textContent = meta ? meta.native : 'English';
      applyStaticI18n(); buildLangMenu();
    }
    renderPage(current, true); renderNav();
  });

  /* ---------- RENDER ---------- */
  function renderPage(route, doScroll) {
    const id = route.section;
    if (id === 'home') renderHome(); else renderSection(id);
    renderBreadcrumb(id); renderFooter(id); renderPager(id); buildToc(id);
    window.scrollTo({ top: 0, behavior: 'auto' });
    closeMobileNav(); setActiveStates(route);
  }
  function renderHome() {
    const h = homeData();
    let cards = '';
    (h.cards || []).forEach((c, i) => { cards += '<div class="kl-card"><div class="ic">' + String(i + 1).padStart(2, '0') + '</div><div class="ct">' + c.t + '</div><div class="cd">' + c.d + '</div></div>'; });
    el.content.innerHTML =
      '<div class="kl-hero">' +
        '<span class="eyebrow">' + h.eyebrow + '</span>' +
        '<h1>' + h.title1 + ' <span class="grad">' + h.title2 + '</span></h1>' +
        '<p class="lead">' + h.lead + '</p>' +
        '<div class="kl-hero-cta">' +
          '<a class="kl-btn kl-btn-primary" data-nav="sec1" href="' + sectionToPath('sec1') + '">' + h.cta1 + ' →</a>' +
          '<a class="kl-btn kl-btn-ghost" data-nav="sec5" href="' + sectionToPath('sec5') + '">' + h.cta2 + '</a>' +
        '</div>' +
        '<div class="kl-byline">' + h.byline + '</div>' +
      '</div>' +
      '<hr class="kl-home-divider" />' +
      '<div class="kl-cards">' + cards + '</div>';
  }
  function fixContentLinks(html) {
    return html.replace(/href="#([\w]+)"/g, function(m, id) {
      return PATH_MAP[id] ? 'href="' + sectionToPath(id) + '"' : m;
    });
  }
  function renderSection(id) {
    el.content.innerHTML = '<h1>' + navLabel(id) + '</h1>' + fixContentLinks(pageHtml(id));
  }
  function renderBreadcrumb(id) {
    const root = 'KLOVER ' + t('ui.docs');
    if (id === 'home') el.breadcrumb.innerHTML = '<span>' + root + '</span>';
    else el.breadcrumb.innerHTML = '<a data-nav="home" href="' + sectionToPath('home') + '">' + root + '</a><span class="sep">›</span><span>' + navLabel(id) + '</span>';
  }
  function renderFooter(id) {
    if (id === 'home') { el.pageFooter.innerHTML = ''; return; }
    el.pageFooter.innerHTML =
      '<div class="kl-helpful" id="helpful">' +
        '<span>' + t('ui.helpfulQuestion') + '</span>' +
        '<button class="kl-helpful-btn" data-helpful>' + t('ui.helpfulYes') + '</button>' +
        '<button class="kl-helpful-btn" data-helpful>' + t('ui.helpfulNo') + '</button>' +
      '</div>' +
      '<div class="kl-meta">' + t('ui.lastModified') + '</div>';
  }
  function renderPager(id) {
    const idx = ORDER.indexOf(id);
    const prev = idx > 0 ? ORDER[idx - 1] : null;
    const next = idx < ORDER.length - 1 ? ORDER[idx + 1] : null;
    let html = '';
    html += prev
      ? '<a class="kl-pager-btn prev" data-nav="' + prev + '" href="' + sectionToPath(prev) + '"><span class="kl-pager-dir">← ' + t('ui.previous') + '</span><span class="kl-pager-title">' + navLabel(prev) + '</span></a>'
      : '<span class="kl-pager-btn empty"></span>';
    html += next
      ? '<a class="kl-pager-btn next" data-nav="' + next + '" href="' + sectionToPath(next) + '"><span class="kl-pager-dir">' + t('ui.next') + ' →</span><span class="kl-pager-title">' + navLabel(next) + '</span></a>'
      : '<span class="kl-pager-btn empty"></span>';
    el.pager.innerHTML = html;
  }

  /* ---------- TOC ---------- */
  let tocObserver = null;
  function buildToc(id) {
    if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
    el.toc.innerHTML = '';
    const tocTitle = document.querySelector('.kl-toc-title');
    const showTitle = (v) => { if (tocTitle) tocTitle.style.display = v ? '' : 'none'; };
    if (id === 'home') { showTitle(false); return; }
    const heads = Array.from(el.content.querySelectorAll('h2[id]'));
    if (!heads.length) { showTitle(false); return; }
    showTitle(true);
    heads.forEach(h => {
      const a = document.createElement('a');
      a.className = 'kl-toc-link'; a.href = '#' + h.id; a.textContent = h.textContent; a.setAttribute('data-anchor', h.id);
      a.addEventListener('click', (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
      el.toc.appendChild(a);
    });
    tocObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const hid = entry.target.id;
          el.toc.querySelectorAll('.kl-toc-link').forEach(l => l.classList.toggle('active', l.getAttribute('data-anchor') === hid));
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });
    heads.forEach(h => tocObserver.observe(h));
  }
  function setActiveStates(route) {
    document.querySelectorAll('.kl-nav-link').forEach(l => l.classList.toggle('active', l.getAttribute('data-nav') === route.section));
  }

  /* ---------- SEARCH ---------- */
  function stripHtml(s) { const d = document.createElement('div'); d.innerHTML = s; return (d.textContent || '').replace(/\s+/g, ' ').trim(); }
  function esc(s) { return s.replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
  function buildIndex() {
    const idx = [];
    ORDER.forEach(id => {
      if (id === 'home') return;
      idx.push({ section: id, title: navLabel(id), crumb: t('ui.docs'), text: stripHtml(pageHtml(id)) });
    });
    return idx;
  }
  let searchIndex = [];
  function runSearch(q) {
    q = q.trim().toLowerCase();
    if (!q) { el.searchResults.classList.remove('open'); el.searchResults.innerHTML = ''; return; }
    const hits = [];
    for (const item of searchIndex) {
      const hay = (item.title + ' ' + item.text).toLowerCase();
      const pos = hay.indexOf(q);
      if (pos >= 0) hits.push({ item, score: (item.title.toLowerCase().includes(q) ? 0 : 100) + pos });
    }
    hits.sort((a, b) => a.score - b.score);
    renderSearchResults(hits.slice(0, 10), q);
  }
  function highlight(text, q) {
    const i = text.toLowerCase().indexOf(q);
    if (i < 0) return esc(text.slice(0, 90));
    const start = Math.max(0, i - 30);
    const snippet = (start > 0 ? '…' : '') + text.slice(start, i + q.length + 50);
    const j = snippet.toLowerCase().indexOf(q);
    return esc(snippet.slice(0, j)) + '<mark>' + esc(snippet.slice(j, j + q.length)) + '</mark>' + esc(snippet.slice(j + q.length));
  }
  function renderSearchResults(hits, q) {
    if (!hits.length) { el.searchResults.innerHTML = '<div class="kl-search-empty">' + t('ui.searchNoResults') + '</div>'; el.searchResults.classList.add('open'); return; }
    el.searchResults.innerHTML = hits.map(h => '<a class="kl-result" href="' + sectionToPath(h.item.section) + '" data-route="' + h.item.section + '"><div class="r-crumb">' + esc(h.item.crumb) + '</div><div class="r-title">' + esc(h.item.title) + '</div>' + (h.item.text ? '<div class="r-snippet">' + highlight(h.item.text, q) + '</div>' : '') + '</a>').join('');
    el.searchResults.classList.add('open');
    el.searchResults.querySelectorAll('.kl-result').forEach(r => r.addEventListener('click', (e) => { e.preventDefault(); navigate(r.getAttribute('data-route')); el.searchResults.classList.remove('open'); el.search.value = ''; }));
  }
  el.search.addEventListener('input', () => { searchIndex = buildIndex(); runSearch(el.search.value); });
  el.search.addEventListener('focus', () => { searchIndex = buildIndex(); if (el.search.value) runSearch(el.search.value); });
  document.addEventListener('click', (e) => { if (!e.target.closest('.kl-search-wrap')) el.searchResults.classList.remove('open'); });
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== el.search) { e.preventDefault(); el.search.focus(); }
    if (e.key === 'Escape') { el.searchResults.classList.remove('open'); el.search.blur(); closeLangMenu(); closeModal(); }
  });

  /* ---------- COMPONENT INTERACTIONS (delegated) ---------- */
  document.addEventListener('click', (e) => {
    const copyBtn = e.target.closest('[data-copy]');
    if (copyBtn) {
      const pre = copyBtn.closest('.kl-code').querySelector('code');
      const text = pre ? pre.textContent : '';
      navigator.clipboard && navigator.clipboard.writeText(text);
      const orig = copyBtn.textContent; copyBtn.textContent = t('ui.copied');
      setTimeout(() => { copyBtn.textContent = orig; }, 1400);
    }
    const tabHead = e.target.closest('.kl-tab-head');
    if (tabHead) {
      const tabs = tabHead.closest('[data-tabs]'); const i = +tabHead.getAttribute('data-tab');
      tabs.querySelectorAll('.kl-tab-head').forEach((b, k) => b.classList.toggle('active', k === i));
      tabs.querySelectorAll('.kl-tab-pane').forEach((p, k) => p.classList.toggle('active', k === i));
    }
    const accHead = e.target.closest('.kl-acc-head');
    if (accHead) accHead.closest('.kl-accordion').classList.toggle('open');
    const helpBtn = e.target.closest('[data-helpful]');
    if (helpBtn) { const box = document.getElementById('helpful'); if (box) box.innerHTML = '<span class="thanks">' + t('ui.helpfulThanks') + '</span>'; }
  });

  /* ---------- MOBILE NAV ---------- */
  function openMobileNav() { document.body.classList.add('nav-open'); }
  function closeMobileNav() { document.body.classList.remove('nav-open'); }
  function closeMobileNavMaybe() { if (window.innerWidth <= 860) closeMobileNav(); }
  el.menuToggle.addEventListener('click', () => document.body.classList.contains('nav-open') ? closeMobileNav() : openMobileNav());
  el.scrim.addEventListener('click', closeMobileNav);
  document.addEventListener('click', (e) => {
    const navEl = e.target.closest('[data-nav]');
    if (!navEl) return;
    e.preventDefault();
    navigate(navEl.getAttribute('data-nav'));
    closeMobileNavMaybe();
  });

  /* ---------- INIT ---------- */
  function init() {
    document.documentElement.setAttribute('lang', lang);
    const meta = LANGS.find(l => l.code === lang);
    el.langCurrent.textContent = meta ? meta.native : 'English';
    applyStaticI18n(); buildLangMenu(); renderNav(); renderPage(current, false);
  }
  init();
})();
</script>
</body>
</html>
