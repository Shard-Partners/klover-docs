<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KLOVER Docs</title>
<meta name="description" content="Official documentation for KLOVER, the K-Culture Web3 ecosystem." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231F5236'%3E%3Ccircle cx='12' cy='7.5' r='3.6'/%3E%3Ccircle cx='7.5' cy='12' r='3.6'/%3E%3Ccircle cx='16.5' cy='12' r='3.6'/%3E%3Ccircle cx='12' cy='16.5' r='3.6'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;450;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   KLOVER documentation base styles
   ============================================================ */
:root {
  --kl-bg: #ffffff;
  --kl-bg-subtle: #f7f8fa;
  --kl-bg-elevated: #ffffff;
  --kl-text: #1b1f24;
  --kl-text-muted: #5b6571;
  --kl-text-faint: #6b7280;
  --kl-border: #e8eaed;
  --kl-border-strong: #d6dae0;
  --kl-accent: #16a34a;
  --kl-accent-hover: #128a3e;
  --kl-accent-soft: rgba(22, 163, 74, 0.10);
  --kl-accent-text: #0f7a37;
  --kl-code-bg: #f6f8fa;
  --kl-code-text: #b3216f;
  --kl-info: #2563eb;   --kl-info-bg: rgba(37,99,235,.08);
  --kl-success: #16a34a; --kl-success-bg: rgba(22,163,74,.09);
  --kl-warning: #d97706; --kl-warning-bg: rgba(217,119,6,.10);
  --kl-danger: #dc2626;  --kl-danger-bg: rgba(220,38,38,.08);
  --kl-shadow: 0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.06);
  --kl-shadow-lg: 0 12px 40px rgba(16,24,40,.16);
  --kl-header-h: 60px;
  --kl-sidebar-w: 296px;
  --kl-toc-w: 240px;
  --kl-content-max: 768px;
  --kl-radius: 10px;
  --kl-font: 'Inter', 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --kl-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
}
[data-theme="dark"] {
  --kl-bg: #0e1116;
  --kl-bg-subtle: #161a20;
  --kl-bg-elevated: #161a20;
  --kl-text: #e6edf3;
  --kl-text-muted: #9aa4b0;
  --kl-text-faint: #868f9b;
  --kl-border: #242a31;
  --kl-border-strong: #313840;
  --kl-accent: #2ec571;
  --kl-accent-hover: #43d182;
  --kl-accent-soft: rgba(46,197,113,.14);
  --kl-accent-text: #4ade80;
  --kl-code-bg: #1c2128;
  --kl-code-text: #f0a6c8;
  --kl-info: #60a5fa;   --kl-info-bg: rgba(96,165,250,.12);
  --kl-success: #4ade80; --kl-success-bg: rgba(74,222,128,.12);
  --kl-warning: #fbbf24; --kl-warning-bg: rgba(251,191,36,.12);
  --kl-danger: #f87171;  --kl-danger-bg: rgba(248,113,113,.12);
  --kl-shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.4);
  --kl-shadow-lg: 0 12px 40px rgba(0,0,0,.6);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--kl-header-h) + 24px); }
body { margin: 0; font-family: var(--kl-font); background: var(--kl-bg); color: var(--kl-text); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; line-height: 1.6; word-break: keep-all; overflow-wrap: break-word; }
a { color: var(--kl-accent-text); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: var(--kl-accent-soft); }

/* ---------- Header ---------- */
.kl-header { position: fixed; top: 0; left: 0; right: 0; height: var(--kl-header-h); display: flex; align-items: center; gap: 16px; padding: 0 20px; background: color-mix(in srgb, var(--kl-bg) 88%, transparent); backdrop-filter: saturate(180%) blur(12px); border-bottom: 1px solid var(--kl-border); z-index: 100; }
.kl-brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; color: var(--kl-text); letter-spacing: -.02em; white-space: nowrap; }
.kl-brand:hover { text-decoration: none; }
.kl-brand .leaf { font-size: 20px; }
.kl-brand .tag { font-size: 11px; font-weight: 600; color: var(--kl-accent-text); background: var(--kl-accent-soft); padding: 2px 7px; border-radius: 20px; }
.kl-header-spacer { flex: 1; }
.kl-search-wrap { position: relative; width: min(340px, 38vw); }
.kl-search { width: 100%; height: 38px; padding: 0 36px; background: var(--kl-bg-subtle); border: 1px solid var(--kl-border); border-radius: var(--kl-radius); color: var(--kl-text); font-family: inherit; font-size: 14px; transition: border-color .15s, box-shadow .15s; }
.kl-search:focus { outline: none; border-color: var(--kl-accent); box-shadow: 0 0 0 3px var(--kl-accent-soft); background: var(--kl-bg); }
.kl-search::placeholder { color: var(--kl-text-faint); }
.kl-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--kl-text-faint); pointer-events: none; display: flex; }
.kl-search-kbd { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--kl-text-faint); border: 1px solid var(--kl-border-strong); border-radius: 5px; padding: 1px 6px; pointer-events: none; }
.kl-search-results { position: absolute; top: 46px; left: 0; right: 0; max-height: 60vh; overflow-y: auto; background: var(--kl-bg-elevated); border: 1px solid var(--kl-border); border-radius: var(--kl-radius); box-shadow: var(--kl-shadow-lg); padding: 6px; display: none; z-index: 120; }
.kl-search-results.open { display: block; }
.kl-result { display: block; padding: 9px 11px; border-radius: 7px; color: var(--kl-text); cursor: pointer; }
.kl-result:hover, .kl-result.active { background: var(--kl-accent-soft); text-decoration: none; }
.kl-result .r-title { font-weight: 600; font-size: 14px; }
.kl-result .r-crumb { font-size: 12px; color: var(--kl-text-faint); margin-bottom: 2px; }
.kl-result .r-snippet { font-size: 12.5px; color: var(--kl-text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kl-result mark { background: var(--kl-accent-soft); color: var(--kl-accent-text); border-radius: 3px; padding: 0 1px; }
.kl-search-empty { padding: 18px 12px; text-align: center; color: var(--kl-text-faint); font-size: 13px; }
.kl-iconbtn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: var(--kl-radius); background: transparent; border: 1px solid transparent; color: var(--kl-text-muted); cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
.kl-iconbtn:hover { background: var(--kl-bg-subtle); color: var(--kl-text); border-color: var(--kl-border); }

/* ---------- Language dropdown ---------- */
.kl-lang { position: relative; }
.kl-lang-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 11px; background: transparent; border: 1px solid var(--kl-border); border-radius: var(--kl-radius); color: var(--kl-text); cursor: pointer; font-family: inherit; font-size: 13.5px; font-weight: 500; transition: background .15s, border-color .15s; }
.kl-lang-btn:hover { background: var(--kl-bg-subtle); border-color: var(--kl-border-strong); }
.kl-lang-btn .chev { transition: transform .18s; color: var(--kl-text-faint); }
.kl-lang.open .kl-lang-btn .chev { transform: rotate(180deg); }
.kl-lang-menu { position: absolute; top: 46px; right: 0; min-width: 188px; background: var(--kl-bg-elevated); border: 1px solid var(--kl-border); border-radius: var(--kl-radius); box-shadow: var(--kl-shadow-lg); padding: 6px; z-index: 120; opacity: 0; visibility: hidden; transform: translateY(-6px); transition: opacity .16s, transform .16s, visibility .16s; }
.kl-lang.open .kl-lang-menu { opacity: 1; visibility: visible; transform: translateY(0); }
.kl-lang-opt { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 11px; border-radius: 7px; cursor: pointer; color: var(--kl-text); font-size: 14px; }
.kl-lang-opt:hover { background: var(--kl-bg-subtle); }
.kl-lang-opt .native { font-weight: 500; }
.kl-lang-opt .en-name { font-size: 11.5px; color: var(--kl-text-faint); }
.kl-lang-opt .check { color: var(--kl-accent); opacity: 0; display: flex; }
.kl-lang-opt.active .check { opacity: 1; }
.kl-lang-opt.active { background: var(--kl-accent-soft); }

/* ---------- Layout ---------- */
.kl-layout { display: flex; padding-top: var(--kl-header-h); }
.kl-sidebar { position: fixed; top: var(--kl-header-h); bottom: 0; left: 0; width: var(--kl-sidebar-w); overflow-y: auto; overscroll-behavior: contain; border-right: 1px solid var(--kl-border); background: var(--kl-bg); padding: 22px 16px 60px; }
.kl-main { flex: 1; min-width: 0; margin-left: var(--kl-sidebar-w); display: flex; justify-content: center; padding: 40px 48px 120px; }
.kl-article-wrap { width: 100%; max-width: var(--kl-content-max); }
.kl-toc { position: fixed; top: var(--kl-header-h); right: 0; width: var(--kl-toc-w); height: calc(100vh - var(--kl-header-h)); overflow-y: auto; padding: 40px 24px 60px; }
@media (min-width: 1081px) { .kl-main { margin-right: var(--kl-toc-w); } }

/* ---------- Sidebar nav ---------- */
.kl-nav-group { margin-bottom: 22px; }
.kl-nav-group-label { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--kl-text-faint); padding: 0 12px 8px; }
.kl-nav-link { display: flex; align-items: center; gap: 9px; padding: 7px 12px; border-radius: 8px; margin: 1px 0; color: var(--kl-text-muted); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .13s, color .13s; }
.kl-nav-link:hover { background: var(--kl-bg-subtle); color: var(--kl-text); text-decoration: none; }
.kl-nav-link.active { background: var(--kl-accent-soft); color: var(--kl-accent-text); font-weight: 600; }
.kl-nav-link .ico { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

/* ---------- Content / typography ---------- */
.kl-breadcrumb { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--kl-text-faint); margin-bottom: 18px; flex-wrap: wrap; }
.kl-breadcrumb a { color: var(--kl-text-muted); }
.kl-breadcrumb .sep { opacity: .6; }
.kl-article h1 { font-size: 34px; font-weight: 800; letter-spacing: -.025em; margin: 0 0 14px; line-height: 1.2; }
.kl-article h2 { font-size: 23px; font-weight: 700; letter-spacing: -.015em; margin: 44px 0 14px; line-height: 1.3; padding-top: 8px; scroll-margin-top: calc(var(--kl-header-h) + 24px); }
.kl-article h3 { font-size: 17.5px; font-weight: 700; margin: 28px 0 10px; }
.kl-article p { margin: 0 0 16px; }
.kl-lead { font-size: 18px; line-height: 1.6; color: var(--kl-text-muted); margin-bottom: 28px !important; }
.kl-article ul, .kl-article ol { margin: 0 0 16px; padding-left: 22px; }
.kl-article li { margin: 7px 0; }
.kl-article strong { color: var(--kl-text); font-weight: 700; }
.kl-article code { background: var(--kl-code-bg); color: var(--kl-code-text); font-size: .88em; padding: 2px 6px; border-radius: 6px; font-family: var(--kl-mono); }
.kl-article hr { border: none; border-top: 1px solid var(--kl-border); margin: 40px 0; }
.kl-article a { font-weight: 500; }
.kl-article blockquote { margin: 22px 0; padding: 4px 18px; border-left: 3px solid var(--kl-accent); color: var(--kl-text-muted); font-size: 16px; }
.kl-img-ph { display: flex; align-items: center; justify-content: center; gap: 8px; height: 180px; border: 1px dashed var(--kl-border-strong); border-radius: var(--kl-radius); color: var(--kl-text-faint); font-size: 15px; background: var(--kl-bg-subtle); margin: 18px 0; }

/* Hints / callouts */
.kl-hint { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--kl-radius); margin: 20px 0; font-size: 14.5px; border: 1px solid transparent; }
.kl-hint .h-ic { flex-shrink: 0; font-size: 17px; line-height: 1.5; }
.kl-hint .h-body { color: var(--kl-text); }
.kl-hint.info { background: var(--kl-info-bg); border-color: color-mix(in srgb, var(--kl-info) 26%, transparent); }
.kl-hint.success { background: var(--kl-success-bg); border-color: color-mix(in srgb, var(--kl-success) 26%, transparent); }
.kl-hint.warning { background: var(--kl-warning-bg); border-color: color-mix(in srgb, var(--kl-warning) 30%, transparent); }
.kl-hint.danger { background: var(--kl-danger-bg); border-color: color-mix(in srgb, var(--kl-danger) 28%, transparent); }
.kl-hint.accent { background: var(--kl-accent-soft); border-color: color-mix(in srgb, var(--kl-accent) 30%, transparent); }

/* Placeholders */
.kl-tbd { background: #fce7f3; color: #be185d; font-weight: 600; padding: 1px 7px; border-radius: 5px; font-size: .92em; border: 1px solid #f9a8d4; }
[data-theme="dark"] .kl-tbd { background: rgba(236,72,153,.20); color: #f9a8d4; border-color: rgba(236,72,153,.45); }
.kl-soon { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; text-align: center; padding: 34px 24px; border: 1.5px dashed var(--kl-border-strong); border-radius: var(--kl-radius); background: var(--kl-bg-subtle); margin: 22px 0; }
.kl-soon-badge { font-size: 18px; font-weight: 800; color: var(--kl-text); letter-spacing: -.01em; }
.kl-soon-sub { font-size: 13.5px; color: var(--kl-text-faint); }

/* Timeline (roadmap) */
.kl-timeline { position: relative; margin: 26px 0 8px; padding-left: 6px; }
.kl-tl-item { position: relative; padding: 0 0 28px 34px; border-left: 2px solid var(--kl-border); }
.kl-tl-item:last-child { border-left-color: transparent; padding-bottom: 4px; }
.kl-tl-dot { position: absolute; left: -9px; top: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--kl-bg); border: 2px solid var(--kl-accent); }
.kl-tl-item.future .kl-tl-dot { border-color: var(--kl-border-strong); }
.kl-tl-phase { font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--kl-accent-text); margin-bottom: 3px; }
.kl-tl-title { font-size: 18px !important; font-weight: 700; margin: 0 0 6px !important; padding-top: 0 !important; }
.kl-tl-body { font-size: 14.5px; color: var(--kl-text-muted); }

/* Code block */
.kl-code { border: 1px solid var(--kl-border); border-radius: var(--kl-radius); overflow: hidden; margin: 18px 0; background: var(--kl-code-bg); }
.kl-code-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--kl-border); font-size: 12.5px; color: var(--kl-text-muted); font-family: var(--kl-mono); }
.kl-copy { background: transparent; border: 1px solid var(--kl-border-strong); color: var(--kl-text-muted); border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; font-family: var(--kl-font); transition: background .13s, color .13s; }
.kl-copy:hover { background: var(--kl-bg); color: var(--kl-text); }
.kl-code pre { margin: 0; padding: 14px 16px; overflow-x: auto; }
.kl-code code { background: none; color: var(--kl-text); padding: 0; font-size: 13.5px; font-family: var(--kl-mono); line-height: 1.7; }

/* Tables */
.kl-table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 14px; }
.kl-table th, .kl-table td { text-align: left; padding: 10px 14px; border: 1px solid var(--kl-border); }
.kl-table th { background: var(--kl-bg-subtle); font-weight: 700; }
/* ---- $KLVR tokenomics table + release chart ---- */
.klvr-alloc { font-size: 14px; }
.klvr-alloc th.num, .klvr-alloc td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.klvr-alloc tfoot td { font-weight: 700; background: var(--kl-bg-subtle); }
.klvr-cat { display: inline-flex; align-items: center; gap: 8px; }
.klvr-cat-dot { width: 9px; height: 9px; border-radius: 2px; flex: none; }
.klvr-tk-wrap { margin: 26px 0 6px; }
.klvr-chart-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.klvr-chart-title { font-family: var(--kl-serif); font-size: 21px; font-weight: 400; letter-spacing: -0.01em; color: var(--kl-text); }
.klvr-chart-unit { font-size: 11px; color: var(--kl-text-muted); letter-spacing: 0.02em; white-space: nowrap; }
.klvr-chart-plot { position: relative; width: 100%; }
.klvr-svg { width: 100%; height: auto; display: block; overflow: visible; }
.klvr-grid { stroke: var(--kl-border); stroke-width: 1; shape-rendering: crispEdges; opacity: 0.7; }
.klvr-axis-y { fill: var(--kl-text-faint); font-size: 10px; text-anchor: end; }
.klvr-axis-x { fill: var(--kl-text-faint); font-size: 9.5px; text-anchor: middle; }
.klvr-tge { fill: var(--kl-accent); font-size: 10px; font-weight: 700; text-anchor: middle; letter-spacing: 0.03em; }
.klvr-tge-line { stroke: var(--kl-accent); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.5; }
.klvr-area { stroke: var(--kl-bg); stroke-width: 0.6; transition: opacity 0.12s ease; }
.klvr-area.dim { opacity: 0.3; }
.klvr-cross { stroke: var(--kl-text); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0.45; pointer-events: none; }
.klvr-overlay { cursor: crosshair; }
.klvr-tip { position: absolute; min-width: 184px; max-width: 250px; background: var(--kl-bg-elevated, var(--kl-bg)); border: 1px solid var(--kl-border); border-radius: 9px; padding: 10px 12px; font-size: 12px; box-shadow: var(--kl-shadow-lg, 0 10px 30px rgba(0,0,0,0.16)); pointer-events: none; transition: opacity 0.1s ease; z-index: 6; }
.klvr-tip-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 5px; }
.klvr-tip-head b { font-size: 13px; color: var(--kl-text); }
.klvr-tip-head span { font-size: 10px; color: var(--kl-text-faint); white-space: nowrap; }
.klvr-tip-total { font-size: 11px; color: var(--kl-text-muted); padding-bottom: 6px; margin-bottom: 6px; border-bottom: 1px solid var(--kl-border); }
.klvr-tip-total b { color: var(--kl-text); font-size: 12.5px; }
.klvr-tip-row { display: flex; align-items: center; gap: 7px; padding: 1.5px 0; line-height: 1.5; }
.klvr-tip-name { flex: 1; color: var(--kl-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.klvr-tip-val { color: var(--kl-text-muted); font-variant-numeric: tabular-nums; }
.klvr-tip-row.hot .klvr-tip-name, .klvr-tip-row.hot .klvr-tip-val { color: var(--kl-text); font-weight: 700; }
.klvr-sw { width: 9px; height: 9px; border-radius: 2px; flex: none; display: inline-block; }
.klvr-legend { display: flex; flex-wrap: wrap; gap: 7px 16px; margin-top: 14px; font-size: 11.5px; color: var(--kl-text-muted); }
.klvr-leg-item { display: flex; align-items: center; gap: 6px; }
@media (max-width: 640px) { .klvr-chart-title { font-size: 18px; } .klvr-tip { min-width: 150px; font-size: 11px; } }

/* Tabs */
.kl-tabs { margin: 18px 0; }
.kl-tab-heads { display: flex; gap: 4px; border-bottom: 1px solid var(--kl-border); }
.kl-tab-head { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 9px 14px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--kl-text-muted); cursor: pointer; margin-bottom: -1px; }
.kl-tab-head.active { color: var(--kl-accent-text); border-bottom-color: var(--kl-accent); }
.kl-tab-pane { display: none; padding-top: 6px; }
.kl-tab-pane.active { display: block; }

/* Cards */
.kl-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin: 22px 0; }
.kl-card { padding: 20px; border: 1px solid var(--kl-border); border-radius: var(--kl-radius); background: var(--kl-bg-elevated); transition: border-color .15s, transform .15s, box-shadow .15s; }
.kl-card:hover { border-color: var(--kl-accent); transform: translateY(-2px); box-shadow: var(--kl-shadow); }
.kl-card .ic { font-size: 24px; margin-bottom: 10px; }
.kl-card .ct { font-weight: 700; font-size: 16px; margin-bottom: 5px; }
.kl-card .cd { font-size: 13.5px; color: var(--kl-text-muted); }

/* Accordion / expandable */
.kl-accordion { border: 1px solid var(--kl-border); border-radius: var(--kl-radius); margin: 12px 0; overflow: hidden; }
.kl-acc-head { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; background: transparent; border: none; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--kl-text); cursor: pointer; text-align: left; }
.kl-acc-head:hover { background: var(--kl-bg-subtle); }
.kl-acc-ic { color: var(--kl-text-faint); font-size: 18px; transition: transform .2s; flex-shrink: 0; }
.kl-accordion.open .kl-acc-ic { transform: rotate(45deg); }
.kl-acc-body { display: none; padding: 0 16px 14px; color: var(--kl-text-muted); font-size: 14.5px; }
.kl-accordion.open .kl-acc-body { display: block; }
.kl-acc-body p { margin: 0; }

/* Helpful footer */

  pages: {
    sec1: `<p class="kl-lead">Welcome to the official documentation for KLOVER, the K-Culture Web3 ecosystem that lets fans around the world own, influence, and engage with the culture they love. This documentation explains what KLOVER is, how its ecosystem works, and how fans, partners, and supporters can take part.</p>
<h2 id="what">What is KLOVER?</h2>
<p>KLOVER is a Web3 ecosystem built to <strong>tokenize culture</strong>, beginning with Korean culture (K-POP, creators, and esports) and expanding worldwide. It connects K-Culture organizations with their global fanbases through <strong>Culture Tokens</strong>, digital assets that transform passive fandom into active participation and ownership. The entire ecosystem is built on the <strong>BASE</strong> blockchain.</p>
<h2 id="audience">Who This Documentation Is For</h2>
<p>This documentation serves three audiences:</p>
<ul>
<li><strong>Fans</strong> who want to own Culture Tokens, take part in decisions, and reach exclusive experiences.</li>
<li><strong>K-Culture organizations</strong> exploring how to bring their communities on-chain and launch a Culture Token.</li>
<li><strong>Partners and supporters</strong> who want to understand the ecosystem, the $KLVR token, and the vision behind it.</li>
</ul>
<p>You can read it from start to finish, or jump to the section most relevant to you.</p>
<h2 id="mission">Mission: Tokenize Culture</h2>
<p>Our mission is simple: <strong>Tokenize Culture.</strong> We believe fans are not merely spectators. They are co-creators of culture's value, and KLOVER gives that contribution a tangible form.</p>
<p>We start with Korean culture, and our vision is to expand to global culture, making KLOVER the home where any culture and its community can grow together.</p>
<h2 id="brand">The KLOVER Brand</h2>
<p>The KLOVER name unites two ideas. The <strong>clover</strong> is a universal symbol of luck, growth, and good fortune. <strong>"K-Lover"</strong> is the global community that loves K-Culture. Together they capture what KLOVER stands for: a flourishing home for the people who love culture and help it grow.</p>
<h2 id="life4cut">Life4Cut: The Organization Behind KLOVER</h2>
<p>KLOVER is founded and operated by <strong>Life4Cut</strong>, Korea's leading photobooth brand and a globally recognized name in K-Culture experiences. Life4Cut gives KLOVER deep cultural roots, brand trust, and direct connections across the K-Culture industry, a foundation few can match.</p>
<h2 id="terminology">Key Terminology</h2>
<p>A quick reference for the core terms used throughout this documentation:</p>
<div class="kl-dl">
<div class="row"><dt>KLOVER</dt><dd>The overall K-Culture Web3 ecosystem and its consumer platform.</dd></div>
<div class="row"><dt>$KLVR</dt><dd>The native token that powers the ecosystem and is used to acquire Culture Tokens.</dd></div>
<div class="row"><dt>Culture Token</dt><dd>A token issued by a K-Culture organization that unlocks utilities for its holders.</dd></div>
<div class="row"><dt>Culture Token Publisher</dt><dd>The organization (a label, MCN, or esports team) that issues a Culture Token.</dd></div>
<div class="row"><dt>Utility</dt><dd>A benefit unlocked by a Culture Token, such as voting or exclusive experiences.</dd></div>
<div class="row"><dt>BASE</dt><dd>The blockchain on which the KLOVER ecosystem is built.</dd></div>
<div class="row"><dt>Presale</dt><dd>The initial sale of a new Culture Token on the KLOVER Platform, before secondary trading begins.</dd></div>
<div class="row"><dt>Utility Hub</dt><dd>The area of the platform where holders use their Culture Tokens to vote and enter experiences.</dd></div>
<div class="row"><dt>Web3</dt><dd>The category of internet services built on public blockchains, where people can truly own digital assets.</dd></div>
</div>`,
    sec2: `<p class="kl-lead">Culture is the greatest thing we have ever built together. Music, film, games, and all the moments around them take on their value in the hands of the people who love them. Yet those same people have rarely shared in what they helped create. KLOVER exists to fix that imbalance, turning culture into something fans can genuinely own. Here is how that journey unfolds.</p>
<h2 id="culture-is-shared">Culture Is Built by All of Us</h2>
<p>A culture is never the work of a few stars alone. It is built by everyone who listens, shares, shows up, and gladly opens their wallet. Every bit of a fan's passion, time, and word of mouth breathes life and value into it.</p>
<p>So the real owners of a culture are the people who cherish it. K-Culture, or any culture beyond it, grows larger the more its people gather around it. That is exactly why KLOVER begins not with the 'K', but with <strong>Culture</strong> itself.</p>
<h2 id="the-gap">Yet None of It Came Back to the Fans</h2>
<p>Fans today are more invested than ever. They stream, they buy merch, they fill arenas. And still they have no channel to shape where the culture they love is headed, and no stake in the value they helped build.</p>
<p>That value flows mostly to platforms and middlemen, while the fans who grew the culture are left with nothing. The passion burns as bright as ever, yet participation always stops at consumption. The link that would connect fans directly to the culture they love simply never existed.</p>
<h2 id="vision">The KLOVER Vision</h2>
<p>KLOVER's answer is simple: make culture something you can own. Through <strong>Culture Tokens</strong>, a fan's contribution takes on a visible, tangible form. It becomes more than applause, growing into a real say in decisions and access to experiences money alone cannot reach.</p>
<p>The picture is concrete. Cast a vote on an artist's next move, hold a stake in a community's journey and grow alongside it, and take part as an owner rather than a guest. And this model does not stop at K-Culture. Any culture in the world, and any community that loves it, can grow side by side. Our vision comes down to two words, <strong>Tokenize Culture</strong>, returning every culture to the people who love it.</p>
<h2 id="why-kculture">We Start With K-Culture</h2>
<p>A vision this big should begin where the spark burns brightest, and for KLOVER that is K-Culture. Spanning K-POP, creators, and esports, K-Culture reaches across the globe, draws some of the most devoted fans anywhere, and already lives and moves online.</p>
<p>On top of that, organizations like labels and MCNs outlast any single artist, carrying many fans across many projects. KLOVER, built by Life4Cut, holds direct relationships throughout this industry. K-Culture is the ideal stage to prove what Tokenize Culture can do, and it is only the first step.</p>
<h2 id="why-now">Why Now</h2>
<p>The technology has only just come of age. Thanks to blockchain, fans can now prove their ownership, exercise real influence, and share in the rewards they helped create. KLOVER puts that technology to work not for speculation, but to turn fandom into genuine participation.</p>
<p>The timing is right, too. K-Culture has already gone global, and the infrastructure to support it is finally in place. Fans gain ownership and a voice, organizations find new ways to connect with their communities and new sources of revenue, and the ecosystem grows stronger with every community that joins. There has never been a better moment to tokenize culture.</p>`,
    sec3: `<p class="kl-lead">The KLOVER ecosystem is built on four connected pillars that work together to tokenize culture.</p>
<h2 id="architecture">Architecture Overview</h2>
<p>KLOVER links four elements into one seamless loop: the <strong>$KLVR token</strong> (the ecosystem's currency), <strong>Culture Tokens</strong> (the assets fans hold), the <strong>KLOVER Platform</strong> (where everything happens), and the <strong>fans</strong> who bring it all to life. Each reinforces the others.</p>
<h2 id="pillars">The Four Pillars</h2>
<div class="kl-cards">
<div class="kl-card"><div class="ic">01</div><div class="ct">$KLVR</div><div class="cd">The native token that powers the ecosystem and is required to acquire Culture Tokens.</div></div>
<div class="kl-card"><div class="ic">02</div><div class="ct">Culture Tokens</div><div class="cd">Tokens issued by K-Culture organizations that unlock real utilities for fans.</div></div>
<div class="kl-card"><div class="ic">03</div><div class="ct">The KLOVER Platform</div><div class="cd">The welcoming home for buying, trading, and using Culture Tokens.</div></div>
<div class="kl-card"><div class="ic">04</div><div class="ct">Fans</div><div class="cd">The global community whose ownership, participation, and energy give the ecosystem its value.</div></div>
</div>
<h2 id="how-it-works">How It Works, End to End</h2>
<p>A typical journey through the ecosystem looks like this:</p>
<ol>
<li>A fan acquires <strong>$KLVR</strong>, or deposits $KLVR or USDT into the platform.</li>
<li>They choose a <strong>Culture Token</strong> from an organization they support.</li>
<li>They join the token's <strong>presale</strong>, or buy it on the secondary market.</li>
<li>They use the token in the <strong>Utility Hub</strong> to vote and enter experiences.</li>
<li>They hold <strong>$KLVR</strong> to take part in ecosystem governance.</li>
</ol>
<h2 id="flywheel">The Economic Flywheel</h2>
<p>The ecosystem is designed as a self-reinforcing loop:</p>
<ul>
<li>Demand for Culture Tokens drives demand for <strong>$KLVR</strong>.</li>
<li>A thriving platform attracts more <strong>Culture Token Publishers</strong>.</li>
<li>More publishers attract more <strong>fans</strong>.</li>
<li>More fans deepen demand across the entire ecosystem.</li>
</ul>
<h2 id="base">Built on BASE</h2>
<p>KLOVER is built on <strong>BASE</strong>, a secure and dependable blockchain with the strength of Ethereum. We chose BASE for four reasons:</p>
<ul>
<li><strong>Low fees</strong> keep everyday actions affordable for fans.</li>
<li><strong>Fast transactions</strong> make the experience feel immediate.</li>
<li><strong>Strong security</strong> inherited from the Ethereum ecosystem.</li>
<li><strong>Wide compatibility</strong> with standard Web3 wallets and tools.</li>
</ul>
<p>The result is infrastructure smooth enough for fans who have never used crypto before.</p>`,
    sec4: `<p class="kl-lead">$KLVR is the native token at the heart of the ecosystem, the currency through which all value flows.</p>

    sec5: `<p class="kl-lead">Culture Tokens are the assets that bring fans and K-Culture organizations together. Each one is issued by a cultural organization and unlocks real utilities for its holders.</p>
<h2 id="what-ct">What is a Culture Token?</h2>
<p>A <strong>Culture Token</strong> is a digital token issued by a K-Culture organization (a music label, an MCN, or an esports team) that represents membership in its community and unlocks exclusive utilities. Holding one is a direct connection to the culture you love.</p>
<h2 id="who">Who Can Issue a Culture Token</h2>
<p>Culture Tokens are issued by <strong>established cultural organizations</strong> rather than individuals. This ensures longevity and a broad utility surface: organizations outlast any single artist or season and can serve many fans across many projects. <em>(See <a data-nav="sec8" href="#sec8">Launching a Culture Token</a>.)</em></p>
<h2 id="utilities">Culture Token Utilities</h2>
<p>Culture Tokens unlock a growing range of utilities. Examples include:</p>
<ul>
<li><strong>Voting:</strong> Publishers invite fans to decide between options approved in advance, such as a single's cover art, a concert outfit, or the next profile picture. Fans shape real outcomes, within boundaries the publisher sets.</li>
<li><strong>Experiences:</strong> Raffles for dinners with artists, early access to concert tickets, priority for fan meetings, and more.</li>
<li><strong>Expanding Utilities:</strong> Utilities grow over time as publishers design new ways to reward their communities.</li>
</ul>
<div class="kl-hint info"><div class="h-ic"></div><div class="h-body">Voting is always curated by the publisher: fans choose among options the publisher has already approved.</div></div>
<h2 id="how-voting">How Voting Works</h2>
<p>Voting gives fans a real voice within clear boundaries:</p>
<ol>
<li>The publisher prepares a decision and a set of approved options.</li>
<li>Holders of the Culture Token cast their votes during a set window.</li>
<li>The result guides the publisher's final choice.</li>
</ol>
<p>Because the options are set in advance, voting stays meaningful and on brand.</p>
<h2 id="lifecycle">The Culture Token Lifecycle</h2>
<ul>
<li><strong>Presale:</strong> Initial distribution on the KLOVER Platform.</li>

<h2 id="ct-klover">Culture Tokens and $KLVR</h2>

<p>Holding a Culture Token means <strong>belonging</strong>. It is a direct line to influence, exclusive access, and a shared stake in a publisher's cultural journey, turning everyday fandom into membership.</p>`,
    sec6: `<p class="kl-lead">The KLOVER Platform is the home of the ecosystem, designed so that anyone, not just crypto experts, can take part.</p>

<ul>

<li>A familiar interface, closer to a consumer app than a trading terminal.</li>

<h2 id="deposits">Deposits and Withdrawals</h2>
<p>You can fund your account with <strong>$KLVR</strong> or <strong>USDT</strong>. Once funded, you can join presales, trade Culture Tokens, and use utilities. The full list of supported networks and deposit options is <span class="kl-tbd">Needs to be decided</span>.</p>
<h2 id="features">Platform Features</h2>
<ul>
<li><strong>Culture Token Presales:</strong> Be among the first to acquire a newly launched Culture Token.</li>

<h2 id="fees">Fee Structure</h2>
<p>KLOVER sustains the ecosystem through transparent transaction fees on platform activity, such as trading. The exact fee rates are <span class="kl-tbd">Needs to be decided</span>, and the full schedule will be published before launch.</p>
<h2 id="security">Infrastructure &amp; Security</h2>
<p>Built on <strong>BASE</strong>, the platform combines blockchain security with a custody and onboarding experience designed for mainstream users. Fans get the safety of decentralized infrastructure with the ease of a consumer app.</p>`,
    sec7: `<p class="kl-lead">KLOVER gives its community a voice. Through ecosystem governance, $KLVR holders help steer the direction of the ecosystem.</p>
<h2 id="gov-philosophy">Governance Philosophy</h2>
<p>Governance at KLOVER is <strong>curated by the team and decided by the community</strong>. The KLOVER team raises matters for a vote, and $KLVR holders decide the outcome. This keeps proposals relevant and actionable while putting real decisions in the community's hands.</p>
<h2 id="how">How Ecosystem Governance Works</h2>
<ol>
<li>The <strong>KLOVER team</strong> submits a proposal.</li>
<li><strong>$KLVR holders</strong> vote, with voting weight based on their holdings.</li>
<li>The outcome is <strong>implemented</strong> by the team.</li>
</ol>
<h2 id="voting-power">How Voting Power Works</h2>
<p>Voting weight is based on the amount of $KLVR a holder commits to a vote. The more $KLVR you hold, the more weight your vote carries. The exact method, including any limits or lockups, is <span class="kl-tbd">Needs to be decided</span>.</p>
<h2 id="examples">Examples of Governance Decisions</h2>
<p>Governance focuses on matters that affect the wider ecosystem. Examples may include:</p>
<ul>
<li>Priorities for new features and utilities.</li>
<li>Direction for ecosystem programs and initiatives.</li>
<li>Selected parameters that shape how the ecosystem runs.</li>
</ul>
<h2 id="scope">Scope of Ecosystem Governance</h2>
<p>Ecosystem governance covers matters at the ecosystem level that the team raises, including direction, priorities, and initiatives that affect the broader KLOVER community. The precise scope of governable decisions is <span class="kl-tbd">Needs to be decided</span>.</p>
<h2 id="vs">Ecosystem Governance vs. Culture Token Voting</h2>
<div class="kl-hint accent"><div class="h-ic"></div><div class="h-body">KLOVER has <strong>two distinct voting systems</strong>. Do not confuse them.</div></div>
<div class="kl-dl">
<div class="row"><dt>Ecosystem Governance</dt><dd>Uses <strong>$KLVR</strong>. Decides matters at the ecosystem level across all of KLOVER.</dd></div>
<div class="row"><dt>Culture Token Voting</dt><dd>Uses a specific <strong>Culture Token</strong>. Decides matters within a single publisher's community (e.g. an album cover).</dd></div>
</div>`,
    sec8: `<p class="kl-lead">KLOVER partners with established K-Culture organizations to bring their communities on-chain. This is a broad overview for prospective partners.</p>
<h2 id="who-partner">Who Should Partner with KLOVER?</h2>
<p>KLOVER is designed for organizations with a <strong>passionate global fanbase</strong> and a <strong>lasting presence</strong> in K-Culture. Because Culture Tokens are issued by organizations rather than individuals, partners can offer enduring value across many artists, creators, and projects.</p>
<h2 id="categories">Eligible Partner Categories</h2>
<ul>
<li><strong>K-POP Entertainment Companies</strong></li>
<li><strong>Korean YouTube MCN Companies</strong></li>
<li><strong>Korean Esports Organizations</strong></li>
</ul>
<p>…and other established K-Culture organizations with a global following.</p>
<h2 id="eligibility">Eligibility</h2>
<p>KLOVER looks for partners that can offer lasting value to a community. Typical signals include a global following, an active fanbase, and a track record in K-Culture. Full eligibility criteria are <span class="kl-tbd">Needs to be decided</span> and are confirmed during review.</p>
<h2 id="receive">What Partners Receive</h2>
<ul>
<li>A complete platform and infrastructure, so there is no need to build Web3 internally.</li>
<li>Access to a global community of culture fans.</li>
<li>Tools for utilities (voting, experiences) and governance.</li>
<li>A new channel for fan engagement and revenue.</li>
</ul>
<h2 id="process">The Launch Process</h2>
<p>At a high level, launching a Culture Token follows these stages:</p>
<ol>
<li><strong>Inquiry.</strong> The organization reaches out to the KLOVER team.</li>
<li><strong>Review.</strong> Both sides confirm fit, goals, and eligibility.</li>
<li><strong>Design.</strong> The token, its utilities, and its launch plan are shaped together.</li>
<li><strong>Presale.</strong> The Culture Token is offered to fans on the platform.</li>
<li><strong>Launch.</strong> Trading and utilities go live, and the community grows from there.</li>
</ol>
<h2 id="revenue">Revenue Model for Partners</h2>
<p>Partners can generate revenue from their Culture Token's presale and from ongoing platform activity. Specific terms and revenue share structures are <span class="kl-tbd">Needs to be decided</span> and are tailored to each partner during onboarding.</p>
<h2 id="inquiry">Partner Inquiry &amp; Next Steps</h2>
<p>Organizations interested in launching a Culture Token are invited to reach out to the KLOVER team. Official partnership contact details are:</p>
<div class="kl-soon"><span class="kl-soon-badge">Coming Soon</span><span class="kl-soon-sub">Partnership contact information will be published here.</span></div>`,
    sec9: `<p class="kl-lead">Here's how we get from where we are today to a world where any culture can be tokenized. The phases below lay out the full journey, from building core infrastructure to expanding well beyond K-Culture. Target timelines are <span class="kl-tbd">Needs to be decided</span> and will be shared as we get closer to each phase.</p>
<div class="kl-timeline">
<div class="kl-tl-item"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 1</div><h2 id="phase-1" class="kl-tl-title">Foundation</h2><div class="kl-tl-body">We're building the technical backbone that everything else runs on. This covers deploying $KLVR and the Culture Token smart contracts on BASE, developing the KLOVER Platform, and putting the security and compliance groundwork in place. The work happening here may be invisible to most people right now, but it's what makes everything that follows possible.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 2</div><h2 id="phase-2" class="kl-tl-title">Bloom Campaign</h2><div class="kl-tl-body">Before the token goes live, we're opening the doors to the community through Bloom, KLOVER's early community program. Participants contribute to the ecosystem in meaningful ways and earn Bloom Points, which convert to $KLVR rewards at launch. Think of it as the earliest way to build your stake before the rest of the world shows up. Bloom isn't about being first for the sake of it. It's about recognizing the people who believed early.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 3</div><h2 id="phase-3" class="kl-tl-title">$KLVR VIP Presale</h2><div class="kl-tl-body">The first real opportunity to hold $KLVR. This presale is exclusively available to whitelisted participants, including Bloom Campaign contributors and vetted community members. It's a limited window before the public launch, and allocation is confirmed during the review process. If you were part of Bloom, this is your reward for showing up early.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 4</div><h2 id="phase-4" class="kl-tl-title">$KLVR Launch</h2><div class="kl-tl-body">This is the moment $KLVR goes live to the world. The launch is our public declaration that KLOVER is open for business. The ecosystem formally opens, the infrastructure built across previous phases starts running at scale, and from here everything moves faster.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 5</div><h2 id="phase-5" class="kl-tl-title">KLOVER Platform</h2><div class="kl-tl-body">With $KLVR live, the KLOVER Platform opens to everyone. Fans can create accounts, deposit $KLVR or USDT, and start participating in Culture Token presales. The Utility Hub goes live so holders can vote, enter experiences, and engage with the communities they care about. This is where KLOVER stops being a concept and becomes something people actually use every day.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 6</div><h2 id="phase-6" class="kl-tl-title">First Culture Tokens</h2><div class="kl-tl-body">We onboard the first wave of K-Culture publishers and launch their Culture Tokens on the platform. Fans join presales, acquire their first tokens, and start accessing real utilities. These inaugural communities set the tone for what KLOVER can be, and we're choosing our first partners carefully to make sure the start is strong.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Phase 7</div><h2 id="phase-7" class="kl-tl-title">Ecosystem Expansion</h2><div class="kl-tl-body">With the foundation proven, we grow. More publishers join across K-POP, MCNs, and esports. The range of utilities expands as publishers learn what their communities respond to. Network effects kick in, and each new community makes the platform stronger for everyone already here.</div></div>
<div class="kl-tl-item future"><div class="kl-tl-dot"></div><div class="kl-tl-phase">Vision</div><h2 id="vision" class="kl-tl-title">Beyond K-Culture</h2><div class="kl-tl-body">The model we build for K-Culture isn't meant to stop there. Once the playbook is proven, KLOVER expands to tokenize cultures worldwide. Any passionate global community, any culture worth owning a piece of, belongs here. The vision is simple: <strong>Tokenize Culture</strong>. All of it.</div></div>
</div>`,
    sec10: `<p class="kl-lead">KLOVER operates with compliance at its core. Please review the following information carefully.</p>
<h2 id="geography">Geographic Availability</h2>
<p>KLOVER is built for fans everywhere and available in most international markets. Access is restricted in sanctioned jurisdictions and certain other regions in line with applicable laws and regulations. Restricted jurisdictions include countries subject to international sanctions such as Iran, North Korea, and Syria, as well as the Republic of Korea and any other markets where participation may be restricted under local rules. A complete list of restricted jurisdictions will be confirmed and published before launch.</p>
<h2 id="eligibility-legal">User Eligibility</h2>
<p>Access to the KLOVER ecosystem may depend on where you live and who you are. Users must meet the minimum age and any requirements that apply in their market, and must not be located in a restricted jurisdiction. Full eligibility terms are <span class="kl-tbd">Needs to be decided</span>.</p>
<h2 id="regulatory">Regulatory Stance</h2>
<p>KLOVER is committed to operating responsibly and adapting to the regulatory frameworks of the markets it serves. Our approach prioritizes long term sustainability and user protection over short term expansion.</p>
<h2 id="privacy">Privacy</h2>
<p>KLOVER is committed to handling personal data responsibly and in line with the rules of the markets it serves. A full privacy policy will be published before launch.</p>
<h2 id="disclaimer">General Risk Disclaimer</h2>
<div class="kl-hint warning"><div class="h-ic"></div><div class="h-body">Digital tokens involve risk, including the potential loss of value. This documentation is for <strong>informational purposes only</strong> and does not constitute financial, investment, or legal advice. Nothing herein is an offer or solicitation to buy or sell any asset. Please do your own research.</div></div>`,

  "pages": {
    "sec1": "<p class=\"kl-lead\">KLOVER는 전 세계 팬이 사랑하는 문화를 직접 소유하고, 방향에 목소리를 내며, 더 깊이 참여할 수 있는 K-Culture Web3 생태계입니다. 이 문서는 KLOVER의 구조와 생태계 작동 방식, 그리고 팬, 파트너, 서포터가 참여하는 방법을 설명합니다.</p>\n<h2 id=\"what\">KLOVER란</h2>\n<p>KLOVER는 <strong>문화를 tokenize</strong>하기 위해 구축한 Web3 생태계로, K-POP, 크리에이터, e스포츠 등 한국 문화에서 시작해 전 세계로 확장합니다. <strong>Culture Token</strong>은 K-Culture 단체와 글로벌 팬덤을 연결하는 디지털 자산이며, 지켜보기만 했던 팬이 이제 직접 참여하고 소유하는 주체가 됩니다. 생태계 전체는 <strong>BASE</strong> 블록체인 위에서 운영됩니다.</p>\n<h2 id=\"audience\">이 문서의 독자</h2>\n<p>이 문서는 세 유형의 독자를 위해 작성했습니다.</p>\n<ul>\n<li><strong>팬</strong>: Culture Token을 소유하고, 의사결정에 참여하며, 특별한 경험을 원하는 분들.</li>\n<li><strong>K-Culture 단체</strong>: 커뮤니티를 on-chain으로 연결하고 Culture Token을 발행하려는 조직.</li>\n<li><strong>파트너와 서포터</strong>: 생태계 구조, $KLVR, KLOVER의 비전을 파악하려는 분들.</li>\n</ul>\n<p>처음부터 순서대로 읽어도 좋고, 필요한 섹션으로 바로 이동해도 됩니다.</p>\n<h2 id=\"mission\">미션: Tokenize Culture</h2>\n<p>KLOVER의 미션은 <strong>Tokenize Culture</strong>입니다. 팬은 단순한 소비자가 아니라 문화 가치를 함께 만드는 공동 창작자이며, KLOVER는 그 기여를 실제 자산으로 전환합니다.</p>\n<p>출발점은 한국 문화이며, KLOVER는 어떤 문화든 그 커뮤니티와 함께 성장하는 공간이 되고자 합니다.</p>\n<h2 id=\"brand\">KLOVER라는 이름</h2>\n<p>KLOVER는 두 가지 뜻을 담고 있습니다. <strong>클로버(clover)</strong>는 행운과 성장, 좋은 기운의 상징이며, <strong>\"K-Lover\"</strong>는 K-Culture를 사랑하는 전 세계 커뮤니티를 가리킵니다. 이 둘이 합쳐져, 문화를 사랑하고 함께 키우는 사람들의 공간이라는 의미를 담습니다.</p>\n<h2 id=\"life4cut\">Life4Cut: KLOVER를 만든 회사</h2>\n<p>KLOVER는 <strong>Life4Cut</strong>이 설립하고 운영합니다. Life4Cut은 한국을 대표하는 포토부스 브랜드이자 K-Culture 경험으로 세계에 이름을 알린 기업입니다. 깊은 문화적 뿌리와 브랜드 신뢰, K-Culture 산업 전반에 직접 닿아 있는 네트워크가 KLOVER의 토대입니다.</p>\n<h2 id=\"terminology\">핵심 용어</h2>\n<p>이 문서 전체에서 자주 쓰이는 핵심 용어를 정리했습니다.</p>\n<div class=\"kl-dl\">\n<div class=\"row\"><dt>KLOVER</dt><dd>K-Culture Web3 생태계 전체와 소비자용 플랫폼을 통틀어 부르는 이름입니다.</dd></div>\n<div class=\"row\"><dt>$KLVR</dt><dd>생태계 기축 통화로, Culture Token 구매와 생태계 참여에 사용됩니다.</dd></div>\n<div class=\"row\"><dt>Culture Token</dt><dd>K-Culture 단체가 발행하는 토큰으로, 홀더에게 유틸리티를 제공합니다.</dd></div>\n<div class=\"row\"><dt>Culture Token Publisher</dt><dd>Culture Token을 발행하는 단체로, 레이블, MCN, e스포츠 팀 등이 해당합니다.</dd></div>\n<div class=\"row\"><dt>Utility</dt><dd>Culture Token으로 이용할 수 있는 혜택으로, 투표권이나 특별 경험 등이 포함됩니다.</dd></div>\n<div class=\"row\"><dt>BASE</dt><dd>KLOVER 생태계가 구축된 블록체인입니다.</dd></div>\n<div class=\"row\"><dt>Presale</dt><dd>2차 거래 개시 전 KLOVER 플랫폼에서 새 Culture Token을 처음 판매하는 단계입니다.</dd></div>\n<div class=\"row\"><dt>Utility Hub</dt><dd>홀더가 Culture Token으로 투표하고 각종 혜택을 이용하는 플랫폼 내 공간입니다.</dd></div>\n<div class=\"row\"><dt>Web3</dt><dd>퍼블릭 블록체인 기반의 인터넷 서비스 영역으로, 디지털 자산을 실제로 소유할 수 있는 환경입니다.</dd></div>\n</div>",
    "sec2": "<p class=\"kl-lead\">문화는 인류가 함께 쌓아 온 가장 큰 유산입니다. 음악, 영화, 게임, 그리고 그 주변의 수많은 순간들. 그 가치는 결국 그것을 사랑하는 사람들이 만들어 냅니다. 그런데 그 가치를 함께 만든 사람들에게 돌아오는 몫은 없었습니다. KLOVER는 이 불균형을 바로잡기 위해 만들어졌으며, 팬이 문화를 진짜로 소유할 수 있게 합니다.</p>\n<h2 id=\"culture-is-shared\">문화는 모두가 함께 만듭니다</h2>\n<p>문화는 소수의 스타만으로 만들어지지 않습니다. 노래를 듣고, 영상을 공유하고, 응원을 보내고, 기꺼이 지갑을 여는 수많은 사람들이 만들어 냅니다. 팬의 열정, 시간, 입소문 하나하나가 문화에 생명과 가치를 불어넣습니다.</p>\n<p>그래서 문화의 진짜 주인은 그것을 아끼는 사람들입니다. K-Culture든 그 너머의 어떤 문화든, 사랑하는 사람이 모일수록 더 크게 자랍니다. 그래서 KLOVER는 'K'가 아닌 <strong>Culture</strong> 자체를 중심에 둡니다.</p>\n<h2 id=\"the-gap\">그런데 팬에게 돌아오는 몫은 없었습니다</h2>\n<p>오늘날 팬들의 참여도는 그 어느 때보다 깊습니다. 스트리밍을 돌리고, 굿즈를 구매하고, 공연장을 가득 채웁니다. 그러나 사랑하는 문화의 방향에 목소리를 낼 수단도, 함께 키운 가치에 대한 지분도 없습니다.</p>\n<p>그렇게 쌓인 가치는 대부분 플랫폼과 중개자에게 흘러갑니다. 문화를 키운 팬은 빈손으로 남으며, 열정은 뜨겁지만 참여는 소비에서 멈춥니다. 팬이 문화와 직접 연결될 방법이 지금껏 없었습니다.</p>\n<h2 id=\"vision\">KLOVER의 비전</h2>\n<p>KLOVER의 답은 단순합니다. 문화를 소유할 수 있게 만드는 것입니다. <strong>Culture Token</strong>을 통해 팬의 기여는 실제로 소유할 수 있는 자산이 됩니다. 단순한 응원을 넘어, 의사결정에 참여할 권리와 돈으로는 살 수 없는 경험을 얻게 됩니다.</p>\n<p>아티스트의 다음 행보에 직접 투표하고, 커뮤니티의 여정에 지분을 갖고 함께 성장하며, 손님이 아닌 주인으로 참여합니다. 이 모델은 K-Culture에만 머물지 않습니다. 세계 어느 문화든, 그 문화를 사랑하는 커뮤니티라면 함께 자랄 수 있습니다. KLOVER의 비전은 두 단어입니다. <strong>Tokenize Culture</strong>, 그 문화를 사랑하는 사람들에게 돌려주는 일입니다.</p>\n<h2 id=\"why-kculture\">시작은 K-Culture입니다</h2>\n<p>KLOVER의 출발점은 K-Culture입니다. K-POP, 크리에이터, e스포츠를 아우르며 전 세계로 뻗어 있고, 어디서나 가장 열성적인 팬들이 있으며, 이미 온라인에서 활발하게 살아 움직이는 문화입니다.</p>\n<p>레이블이나 MCN 같은 조직은 아티스트 한 명보다 오래가고, 여러 프로젝트를 거치며 수많은 팬을 품습니다. KLOVER를 만든 Life4Cut은 이 산업 전반과 직접 연결된 네트워크를 갖고 있습니다. K-Culture는 이 모델을 검증하기에 가장 적합한 시장이며, 어디까지나 첫걸음입니다.</p>\n<h2 id=\"why-now\">왜 지금인가</h2>\n<p>블록체인 기술이 이제 충분히 무르익었습니다. 팬은 소유권을 증명하고, 직접 영향력을 행사하며, 함께 만든 결실을 나눌 수 있게 됐습니다. KLOVER는 이 기술을 투기가 아닌 팬 참여에 씁니다.</p>\n<p>시기도 맞아떨어집니다. K-Culture는 이미 글로벌 시장의 주류이고, 이를 뒷받침할 인프라도 갖춰졌습니다. 팬은 소유권과 목소리를 얻고, 조직은 커뮤니티와 새롭게 연결되며 새로운 수익원을 확보합니다. 생태계는 새로운 커뮤니티가 합류할 때마다 더 단단해집니다. 문화를 tokenize할 최적의 순간은 지금입니다.</p>",
    "sec3": "<p class=\"kl-lead\">KLOVER 생태계는 서로 맞물린 네 가지 요소로 구성되며, 각 요소가 순환하며 생태계 전체를 움직입니다.</p>\n<h2 id=\"architecture\">전체 구조</h2>\n<p>KLOVER는 네 가지 요소를 하나로 연결합니다. 생태계 기축 통화 <strong>$KLVR</strong>, 팬이 직접 보유하는 자산 <strong>Culture Token</strong>, 모든 활동이 이루어지는 <strong>KLOVER 플랫폼</strong>, 그리고 생태계를 실제로 움직이는 <strong>팬</strong>. 네 요소는 서로를 강화하며 하나의 순환 구조를 이룹니다.</p>\n<h2 id=\"pillars\">네 가지 핵심 요소</h2>\n<div class=\"kl-cards\">\n<div class=\"kl-card\"><div class=\"ic\">01</div><div class=\"ct\">$KLVR</div><div class=\"cd\">생태계 기축 통화로, Culture Token 구매와 Governance 참여에 사용됩니다.</div></div>\n<div class=\"kl-card\"><div class=\"ic\">02</div><div class=\"ct\">Culture Token</div><div class=\"cd\">K-Culture 조직이 발행하는 토큰으로, 팬이 실제로 쓸 수 있는 혜택을 담습니다.</div></div>\n<div class=\"kl-card\"><div class=\"ic\">03</div><div class=\"ct\">KLOVER 플랫폼</div><div class=\"cd\">Culture Token을 사고, 거래하고, 사용하는 공간입니다.</div></div>\n<div class=\"kl-card\"><div class=\"ic\">04</div><div class=\"ct\">팬</div><div class=\"cd\">직접 소유하고 참여하는 전 세계 커뮤니티로, 생태계의 가치는 팬에게서 나옵니다.</div></div>\n</div>\n<h2 id=\"how-it-works\">흐름 전체 보기</h2>\n<p>생태계를 이용하는 순서는 이렇습니다.</p>\n<ol>\n<li>팬이 <strong>$KLVR</strong>을 확보하거나, $KLVR이나 USDT를 플랫폼에 입금합니다.</li>\n<li>응원하는 조직의 <strong>Culture Token</strong>을 선택합니다.</li>\n<li>해당 토큰의 <strong>presale</strong>에 참여하거나, 2차 시장에서 구매합니다.</li>\n<li><strong>Utility Hub</strong>에서 토큰으로 투표하고 각종 혜택을 이용합니다.</li>\n<li><strong>$KLVR</strong>을 보유해 생태계 Governance에 참여합니다.</li>\n</ol>\n<h2 id=\"flywheel\">자기강화 경제 구조</h2>\n<p>생태계는 수요가 수요를 만드는 구조입니다.</p>\n<ul>\n<li>Culture Token 수요가 높아질수록 <strong>$KLVR</strong> 수요도 함께 올라갑니다.</li>\n<li>플랫폼이 성장할수록 더 많은 <strong>Culture Token 발행사</strong>가 참여합니다.</li>\n<li>발행사가 늘수록 더 많은 <strong>팬</strong>이 유입됩니다.</li>\n<li>팬이 늘수록 생태계 전체가 더욱 강해집니다.</li>\n</ul>\n<h2 id=\"base\">BASE 기반 인프라</h2>\n<p>KLOVER는 이더리움의 보안을 그대로 이어받은 <strong>BASE</strong> 블록체인 위에 구축되어 있으며, BASE를 선택한 이유는 네 가지입니다.</p>\n<ul>\n<li><strong>낮은 수수료</strong>로 팬의 일상 활동 비용을 낮춥니다.</li>\n<li><strong>빠른 거래 처리</strong>로 막힘 없는 사용 경험을 줍니다.</li>\n<li>이더리움 생태계에서 이어받은 <strong>강한 보안성</strong>을 갖췄습니다.</li>\n<li>표준 Web3 지갑 및 도구와 <strong>폭넓게 호환</strong>됩니다.</li>\n</ul>\n<p>암호화폐를 처음 접하는 팬도 막힘 없이 쓸 수 있는 인프라입니다.</p>",
    "sec4": "<p class=\"kl-lead\">$KLVR는 KLOVER 생태계의 기축 통화로, Culture Token 구매부터 플랫폼 내 결제, Governance 참여까지 생태계 전반에 걸쳐 사용됩니다.</p>\n<h2 id=\"overview\">개요</h2>\n<h3 id=\"role\">$KLVR의 역할</h3>\n<p>$KLVR는 생태계 전반에서 쓰이는 교환 수단입니다. Culture Token을 살 때 반드시 필요하고, 플랫폼 내 거래 수단이기도 하며, 보유하면 Governance에도 참여할 수 있습니다. KLOVER 안에서 가치가 오가는 모든 곳에 $KLVR가 관여합니다.</p>\n<h3 id=\"utility\">Token Utility</h3>\n<ul>\n<li><strong>Culture Token 구매:</strong> Culture Token은 $KLVR로만 구매할 수 있으며, 구조적으로 꾸준한 수요가 생깁니다.</li>\n<li><strong>Governance:</strong> $KLVR 홀더는 KLOVER 팀이 제안한 안건에 직접 투표합니다.</li>\n<li><strong>플랫폼 결제 수단:</strong> 플랫폼 내 거래와 활동은 $KLVR로 처리됩니다.</li>\n</ul>\n<h3 id=\"demand\">수요 원천</h3>\n<p>$KLVR 수요는 투기가 아니라 생태계 내 실제 사용에서 비롯됩니다.</p>\n<ul>\n<li><strong>Culture Token 구매.</strong> 모든 Culture Token은 $KLVR로 구매합니다.</li>\n<li><strong>플랫폼 활동.</strong> 생태계 내 거래는 $KLVR로 정산됩니다.</li>\n<li><strong>Governance.</strong> $KLVR를 보유해야 의사결정에 참여할 수 있습니다.</li>\n</ul>\n<h3 id=\"standard\">토큰 표준</h3>\n<p>$KLVR는 BASE 블록체인에 배포된 ERC-20 토큰으로, 표준 Web3 지갑과 도구에서 바로 사용할 수 있습니다. 공식 컨트랙트 주소는 <span class=\"kl-tbd\">미정</span>이며, 출시 전에 이 페이지에 공개됩니다.</p>\n<h3 id=\"acquire\">$KLVR 구매 방법</h3>\n<p>팬은 KLOVER 플랫폼에서 $KLVR를 직접 구매할 수 있으며, Web3에 익숙하지 않아도 쉽게 시작할 수 있도록 온보딩을 설계했습니다. 지원 구매 방법과 범위는 <span class=\"kl-tbd\">미정</span>입니다.</p>\n<h2 id=\"tokenomics\">Tokenomics</h2>\n<p>$KLVR 전체 물량은 아래 카테고리로 배분되며 합계는 100%입니다. TGE는 2026년 11월(Q4)로 예정되어 있으며, TGE에서 100% 즉시 해제되는 물량은 첫날부터 유통됩니다. 나머지는 Cliff 이후 선형 Vesting으로 순차 해제되어 생태계가 장기적으로 안정을 유지하도록 설계했습니다.</p>\n<div id=\"klvr-table\"></div>\n<div id=\"klvr-chart\" class=\"klvr-tk-wrap\"></div>\n<div class=\"kl-hint info\"><div class=\"h-ic\"></div><div class=\"h-body\">Cliff는 TGE 이후 Vesting이 시작되기 전까지의 잠금 기간입니다. Vesting은 그 이후 토큰이 선형으로 해제되는 기간을 말합니다. 차트는 총발행량 대비 유통 비율을 나타냅니다.</div></div>",
    "sec5": "<p class=\"kl-lead\">Culture Token은 팬과 K-Culture 조직을 연결하는 자산으로, 각 토큰은 문화 조직이 직접 발행하며 홀더가 실제로 쓸 수 있는 혜택을 줍니다.</p>\n<h2 id=\"what-ct\">Culture Token이란</h2>\n<p><strong>Culture Token</strong>은 음악 레이블, MCN, e스포츠 팀 같은 K-Culture 조직이 발행하는 디지털 토큰으로, 커뮤니티 멤버십을 증명하고 홀더 전용 유틸리티를 제공합니다. Culture Token을 보유한다는 건 좋아하는 문화와 직접 연결된다는 의미입니다.</p>\n<h2 id=\"who\">Culture Token 발행 주체</h2>\n<p>Culture Token은 개인이 아니라 <strong>검증된 문화 조직</strong>이 발행합니다. 조직은 특정 아티스트나 시즌을 넘어 지속되며, 여러 프로젝트에 걸쳐 더 많은 팬에게 가치를 전달할 수 있어 토큰의 수명도 길고 유틸리티 범위도 넓습니다. <em>(<a data-nav=\"sec8\" href=\"#sec8\">Culture Token 런칭</a> 참고.)</em></p>\n<h2 id=\"utilities\">Culture Token 유틸리티</h2>\n<p>Culture Token이 제공하는 유틸리티는 계속 확장됩니다. 주요 예시는 다음과 같습니다.</p>\n<ul>\n<li><strong>투표:</strong> 발행사가 미리 승인한 선택지 안에서 팬이 직접 결정하며, 싱글 커버 아트, 콘서트 의상, 다음 프로필 사진 등 팬의 선택이 실제 결과로 이어집니다.</li>\n<li><strong>경험:</strong> 아티스트 디너 래플, 콘서트 티켓 선예매, 팬미팅 우선 참여 등 다양한 혜택을 받을 수 있습니다.</li>\n<li><strong>유틸리티 확장:</strong> 발행사가 더 많은 혜택을 추가할수록 유틸리티도 함께 확장됩니다.</li>\n</ul>\n<div class=\"kl-hint info\"><div class=\"h-ic\"></div><div class=\"h-body\">투표는 항상 발행사가 만들고 운영합니다. 팬은 발행사가 미리 승인한 선택지 중에서 고릅니다.</div></div>\n<h2 id=\"how-voting\">투표 진행 방식</h2>\n<p>투표는 명확한 범위 안에서 팬에게 실제 발언권을 줍니다.</p>\n<ol>\n<li>발행사가 안건과 승인된 선택지를 준비합니다.</li>\n<li>Culture Token 홀더가 정해진 기간 안에 투표합니다.</li>\n<li>결과가 발행사의 최종 결정에 반영됩니다.</li>\n</ol>\n<p>선택지를 미리 정해두기 때문에, 투표는 팬에게 의미 있고 발행사 방향과도 일치합니다.</p>\n<h2 id=\"lifecycle\">Culture Token 라이프사이클</h2>\n<ul>\n<li><strong>Presale:</strong> KLOVER 플랫폼에서 진행하는 최초 배포입니다.</li>\n<li><strong>2차 거래:</strong> 팬이 플랫폼 내 마켓플레이스에서 토큰을 거래합니다.</li>\n<li><strong>지속적인 유틸리티:</strong> 홀더는 투표, 경험 등 각종 유틸리티를 계속 이용할 수 있습니다.</li>\n</ul>\n<h2 id=\"ct-klover\">Culture Token과 $KLVR</h2>\n<p>Culture Token과 $KLVR은 함께 작동합니다. $KLVR은 생태계의 기축 통화이며, 모든 Culture Token은 $KLVR로 구매합니다. Culture Token은 특정 발행사의 유틸리티를 담고, $KLVR은 생태계 전체의 가치와 Governance를 맡습니다.</p>\n<h2 id=\"value\">보유의 가치</h2>\n<p>Culture Token을 보유한다는 건 <strong>소속</strong>입니다. 영향력을 행사하고, 독점 혜택을 누리고, 발행사의 여정에 함께 지분을 갖는 것으로, 팬심이 멤버십으로 바뀝니다.</p>",
    "sec6": "<p class=\"kl-lead\">KLOVER 플랫폼은 암호화폐를 몰라도 누구나 이용할 수 있는 팬 중심 Web3 플랫폼입니다. 계정 생성 후 $KLVR 또는 USDT를 입금하면, Culture Token 거래부터 유틸리티 이용까지 모든 기능을 바로 쓸 수 있습니다.</p>\n<h2 id=\"philosophy\">플랫폼 철학: 장벽 없는 Web3</h2>\n<p>KLOVER는 <strong>팬 중심</strong>으로 만든 플랫폼입니다. 블록체인의 복잡성을 걷어내 누구나 편하게 쓸 수 있습니다. $KLVR 또는 USDT를 입금하면 모든 기능을 바로 이용할 수 있으며, <strong>별도의 DeFi 경험은 필요하지 않습니다.</strong></p>\n<h2 id=\"newcomers\">처음 오신 분을 위한 설계</h2>\n<p>대부분의 팬은 암호화폐 전문가가 아니며, 그럴 필요도 없습니다. KLOVER는 Web3 진입의 대표적인 장벽을 아래와 같이 없앴습니다.</p>\n<ul>\n<li>지갑, 가스비, 개인 키를 몰라도 바로 시작할 수 있습니다.</li>\n<li>트레이딩 터미널이 아닌 일반 소비자 앱 같은 인터페이스를 갖췄습니다.</li>\n<li>Culture Token 구매부터 활용까지 각 단계를 명확하게 안내합니다.</li>\n</ul>\n<h2 id=\"getting-started\">시작하기</h2>\n<p>몇 가지 단계만 거치면 바로 시작할 수 있습니다.</p>\n<ol><li>KLOVER 계정을 만드세요.</li><li><strong>$KLVR</strong> 또는 <strong>USDT</strong>를 입금하세요.</li><li>Culture Token 프리세일에 참여하고, 거래하고, 유틸리티를 사용하세요.</li></ol>\n<h2 id=\"deposits\">입금과 출금</h2>\n<p>계정에는 <strong>$KLVR</strong> 또는 <strong>USDT</strong>를 충전할 수 있으며, 충전 후에는 프리세일 참여, Culture Token 거래, 유틸리티 이용 등 플랫폼의 모든 기능을 이용할 수 있습니다. 지원 네트워크와 입금 방식 전체 목록은 <span class=\"kl-tbd\">미정</span>입니다.</p>\n<h2 id=\"features\">플랫폼 주요 기능</h2>\n<ul>\n<li><strong>Culture Token 프리세일:</strong> 새로 출시된 Culture Token을 남들보다 먼저 살 수 있는 기회입니다.</li>\n<li><strong>거래:</strong> 통합 마켓플레이스에서 Culture Token을 자유롭게 사고팔 수 있습니다.</li>\n<li><strong>Utility Hub:</strong> 투표, 래플, 체험 신청 등 다양한 유틸리티를 한 곳에서 이용할 수 있습니다.</li>\n</ul>\n<h2 id=\"fees\">수수료 구조</h2>\n<p>KLOVER는 거래 등 플랫폼 활동에 투명한 수수료를 적용하여 생태계 운영 비용을 충당합니다. 정확한 수수료율은 <span class=\"kl-tbd\">미정</span>이며, 전체 내역은 런칭 전에 공개할 예정입니다.</p>\n<h2 id=\"security\">인프라와 보안</h2>\n<p>KLOVER는 <strong>BASE</strong>의 탈중앙화 보안 위에 구축되었지만, 사용자 입장에서는 커스터디와 온보딩이 일반 앱과 다를 것이 없습니다.</p>",
    "sec7": "<p class=\"kl-lead\">KLOVER의 생태계 Governance는 $KLVR 홀더가 직접 의사결정에 참여하는 온체인 구조로 운영되며, 커뮤니티가 실질적인 결정권을 갖습니다.</p>\n<h2 id=\"gov-philosophy\">Governance 철학</h2>\n<p>KLOVER의 Governance는 <strong>팀이 안건을 내고, 커뮤니티가 결정하는</strong> 구조로 운영됩니다. KLOVER 팀이 실행 가능한 범위 안에서 안건을 제안하며, 최종 판단은 $KLVR 홀더가 내립니다. 안건의 방향성은 팀이 잡되, 결정권은 커뮤니티가 갖습니다.</p>\n<h2 id=\"how\">생태계 Governance 작동 방식</h2>\n<ol>\n<li><strong>KLOVER 팀</strong>이 안건을 제안합니다.</li>\n<li><strong>$KLVR 홀더</strong>가 투표하며, 투표 비중은 보유량에 따라 정해집니다.</li>\n<li>투표 결과는 팀이 <strong>실행</strong>합니다.</li>\n</ol>\n<h2 id=\"voting-power\">투표권 산정 방식</h2>\n<p>투표 비중은 해당 안건에 행사한 $KLVR 수량을 기준으로 정해지며, 보유량이 많을수록 투표 영향력이 커집니다. 한도 설정이나 락업 적용 등 구체적인 산정 방식은 <span class=\"kl-tbd\">미정</span>입니다.</p>\n<h2 id=\"examples\">Governance 결정 사례</h2>\n<p>Governance는 생태계 전체에 영향을 주는 사안을 다루며, 주요 예시는 다음과 같습니다.</p>\n<ul>\n<li>신규 기능과 유틸리티의 개발 우선순위를 결정합니다.</li>\n<li>생태계 프로그램과 이니셔티브의 방향을 설정합니다.</li>\n<li>생태계 운영의 주요 변수를 조정합니다.</li>\n</ul>\n<h2 id=\"scope\">생태계 Governance 범위</h2>\n<p>생태계 Governance는 팀이 제안하는 생태계 수준의 사안을 다루며, KLOVER 커뮤니티 전체에 영향을 주는 방향, 우선순위, 이니셔티브가 여기에 해당합니다. 거버넌스 결정이 가능한 사안의 정확한 범위는 <span class=\"kl-tbd\">미정</span>입니다.</p>\n<h2 id=\"vs\">생태계 Governance vs. Culture Token 투표</h2>\n<div class=\"kl-hint accent\"><div class=\"h-ic\"></div><div class=\"h-body\">KLOVER에는 <strong>두 가지 별개의 투표 시스템</strong>이 존재합니다. 각각의 목적과 적용 범위를 혼동하지 않도록 주의하세요.</div></div>\n<div class=\"kl-dl\">\n<div class=\"row\"><dt>생태계 Governance</dt><dd><strong>$KLVR</strong>로 진행하며, KLOVER 생태계 전체에 걸친 사안을 결정합니다.</dd></div>\n<div class=\"row\"><dt>Culture Token 투표</dt><dd>특정 <strong>Culture Token</strong>으로 진행하며, 앨범 커버 선정 등 단일 발행사 커뮤니티 내 사안을 결정합니다.</dd></div>\n</div>",
    "sec8": "<p class=\"kl-lead\">KLOVER는 K-Culture 조직과 파트너십을 맺어 해당 커뮤니티를 on-chain으로 연결합니다. KLOVER와의 파트너십을 검토 중인 조직을 위한 안내입니다.</p>\n<h2 id=\"who-partner\">어떤 조직이 잘 맞나요?</h2>\n<p>KLOVER는 <strong>열성적인 글로벌 팬덤</strong>을 보유하고 K-Culture에서 <strong>꾸준한 입지</strong>를 쌓은 조직을 위한 플랫폼입니다. Culture Token은 개인이 아닌 조직 단위로 발행되며, 파트너는 여러 아티스트, 크리에이터, 프로젝트에 걸쳐 팬들에게 꾸준히 가치를 전달할 수 있습니다.</p>\n<h2 id=\"categories\">파트너 가능 조직 유형</h2>\n<ul>\n<li><strong>K-POP 엔터테인먼트 기업</strong></li>\n<li><strong>한국 유튜브 MCN 기업</strong></li>\n<li><strong>한국 e스포츠 조직</strong></li>\n</ul>\n<p>…그 외 글로벌 팬층을 보유한 K-Culture 조직도 대상입니다.</p>\n<h2 id=\"eligibility\">참여 자격</h2>\n<p>KLOVER는 커뮤니티에 꾸준히 가치를 전달할 수 있는 파트너를 찾습니다. 주요 기준은 글로벌 팬층, 활성화된 팬덤, K-Culture에서 쌓은 실적이며, 세부 자격 기준은 <span class=\"kl-tbd\">미정</span>으로 검토 단계에서 최종 확정됩니다.</p>\n<h2 id=\"receive\">파트너 혜택</h2>\n<ul>\n<li>완성된 플랫폼과 인프라를 그대로 활용할 수 있어, 사내에서 Web3를 직접 구축할 필요가 없습니다.</li>\n<li>전 세계 K-Culture 팬 커뮤니티와 바로 연결됩니다.</li>\n<li>투표, 팬 경험 등 유틸리티 도구와 Governance 기능을 활용할 수 있습니다.</li>\n<li>팬 참여를 높이고 새로운 수익 채널을 확보할 수 있습니다.</li>\n</ul>\n<h2 id=\"process\">런칭 프로세스</h2>\n<p>Culture Token 런칭은 다음 단계로 진행됩니다.</p>\n<ol>\n<li><strong>문의.</strong> 조직이 KLOVER 팀에 연락합니다.</li>\n<li><strong>검토.</strong> 양측이 방향성, 목표, 자격 요건을 확인합니다.</li>\n<li><strong>설계.</strong> 토큰 구조, 유틸리티, 런칭 계획을 함께 수립합니다.</li>\n<li><strong>Presale.</strong> Culture Token을 플랫폼에서 팬들에게 공개 판매합니다.</li>\n<li><strong>런칭.</strong> 거래와 유틸리티가 시작되고 커뮤니티가 성장합니다.</li>\n</ol>\n<h2 id=\"revenue\">파트너 수익 모델</h2>\n<p>파트너는 Culture Token Presale과 이후 플랫폼 활동을 통해 수익을 낼 수 있습니다. 구체적인 조건과 수익 배분 구조는 <span class=\"kl-tbd\">미정</span>이며, 온보딩 단계에서 파트너별로 별도 협의합니다.</p>\n<h2 id=\"inquiry\">파트너 문의 및 다음 단계</h2>\n<p>Culture Token 발행을 검토 중인 조직은 KLOVER 팀으로 문의 바랍니다. 파트너십 문의는 아래로 연락해 주세요.</p>\n<div class=\"kl-soon\"><span class=\"kl-soon-badge\">Coming Soon</span><span class=\"kl-soon-sub\">파트너십 연락처가 곧 공개됩니다.</span></div>",
    "sec9": "<p class=\"kl-lead\">KLOVER가 지금 어디에 있고, 어디로 가는지 단계별로 정리했습니다. 핵심 인프라 구축부터 K-Culture를 넘어선 확장까지, 7개 Phase와 Vision으로 구성됩니다. 단계별 일정은 아직 <span class=\"kl-tbd\">미정</span>이며, 각 단계가 가까워지는 시점에 공유할 예정입니다.</p>\n<div class=\"kl-timeline\">\n<div class=\"kl-tl-item\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 1</div><h2 id=\"phase-1\" class=\"kl-tl-title\">Foundation</h2><div class=\"kl-tl-body\">모든 것의 토대가 되는 기술 인프라를 구축하는 단계입니다. BASE에 $KLVR과 Culture Token smart contract를 배포하고, KLOVER 플랫폼을 개발하며, 보안과 컴플라이언스 체계를 마련합니다. 지금 당장 눈에 보이는 작업은 아니지만, 이후 모든 단계는 여기서 비롯됩니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 2</div><h2 id=\"phase-2\" class=\"kl-tl-title\">Bloom Campaign</h2><div class=\"kl-tl-body\">토큰 공식 출시 전, KLOVER 초기 커뮤니티 프로그램 Bloom이 먼저 열립니다. 참여자는 생태계에 기여하며 Bloom Points를 적립하고, 이 포인트는 런칭 시 $KLVR 보상으로 전환됩니다. Bloom은 단순히 먼저 온 사람에게 주는 혜택이 아니라, KLOVER를 일찍 믿고 함께한 사람을 알아보기 위한 자리입니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 3</div><h2 id=\"phase-3\" class=\"kl-tl-title\">$KLVR VIP Presale</h2><div class=\"kl-tl-body\">$KLVR을 처음으로 손에 넣을 수 있는 기회입니다. Whitelist에 등록된 참여자, 즉 Bloom Campaign 기여자와 검증된 커뮤니티 멤버에게만 열립니다. 공개 런칭 전 한정된 기간에만 진행되며, 배정 물량은 심사 과정에서 확정됩니다. Bloom에 참여했다면, 이 자리가 그 보답입니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 4</div><h2 id=\"phase-4\" class=\"kl-tl-title\">$KLVR Launch</h2><div class=\"kl-tl-body\">$KLVR이 세상에 공개됩니다. KLOVER가 정식 운영에 돌입한다는 선언이기도 합니다. 이전 단계에서 구축한 인프라가 본격 가동에 들어가고, 여기서부터 속도가 붙습니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 5</div><h2 id=\"phase-5\" class=\"kl-tl-title\">KLOVER Platform</h2><div class=\"kl-tl-body\">$KLVR 런칭 이후, KLOVER 플랫폼이 모두에게 열립니다. 팬은 계정을 만들고 $KLVR 또는 USDT를 입금해 Culture Token Presale에 참여할 수 있습니다. Utility Hub도 가동되어, 홀더는 투표하고 각종 혜택을 누리며 팬덤과 직접 이어집니다. KLOVER가 개념이 아닌 실제 사용하는 서비스가 되는 시점입니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 6</div><h2 id=\"phase-6\" class=\"kl-tl-title\">First Culture Tokens</h2><div class=\"kl-tl-body\">K-Culture 발행사 1진을 온보딩하고, 이들의 Culture Token을 플랫폼에 처음 선보입니다. 팬은 Presale에 참여해 첫 토큰을 손에 넣고, 실제 유틸리티를 경험하기 시작합니다. 이 첫 커뮤니티들이 KLOVER의 기준을 세우는 만큼, 첫 파트너는 신중하게 선정합니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Phase 7</div><h2 id=\"phase-7\" class=\"kl-tl-title\">Ecosystem Expansion</h2><div class=\"kl-tl-body\">기반이 검증되면 확장합니다. K-POP, MCN, e스포츠 전반에 걸쳐 더 많은 발행사가 합류하고, 각 커뮤니티가 반응하는 유틸리티가 쌓일수록 플랫폼의 폭도 넓어집니다. 새로운 커뮤니티가 합류할수록 기존 참여자에게도 플랫폼이 더 강해지는 네트워크 효과가 생깁니다.</div></div>\n<div class=\"kl-tl-item future\"><div class=\"kl-tl-dot\"></div><div class=\"kl-tl-phase\">Vision</div><h2 id=\"vision\" class=\"kl-tl-title\">Beyond K-Culture</h2><div class=\"kl-tl-body\">K-Culture를 위해 만드는 이 모델은 여기서 끝나지 않습니다. 방식이 검증되면, KLOVER는 전 세계 문화로 확장합니다. 열정 있는 글로벌 커뮤니티라면, 소유할 가치가 있는 문화라면 이곳에 자리가 있습니다. 비전은 단순합니다. <strong>Tokenize Culture</strong>. 세상 모든 문화를.</div></div>\n</div>",
    "sec10": "<p class=\"kl-lead\">KLOVER는 컴플라이언스를 운영 원칙으로 삼으며, 아래 내용을 반드시 확인하시기 바랍니다.</p>\n<h2 id=\"geography\">서비스 제공 지역</h2>\n<p>KLOVER는 대부분의 국제 시장에서 이용할 수 있으며, 관련 법령 및 규정에 따라 제재 대상 국가와 일부 지역에서는 이용이 제한됩니다. 제한 지역에는 이란, 북한, 시리아 등 국제 제재 대상 국가, 대한민국, 그리고 현지 규정상 참여가 제한될 수 있는 기타 시장이 포함됩니다. 제한 지역의 전체 목록은 출시 전에 확정해 공개합니다.</p>\n<h2 id=\"eligibility-legal\">이용 자격</h2>\n<p>KLOVER 생태계 이용 가능 여부는 거주 지역과 이용자 상황에 따라 달라집니다. 이용자는 해당 시장에서 요구하는 최소 연령 및 기타 조건을 충족해야 하며, 제한 지역에 위치해서는 안 됩니다. 세부 이용 자격 조건은 <span class=\"kl-tbd\">미정</span>입니다.</p>\n<h2 id=\"regulatory\">규제 대응</h2>\n<p>KLOVER는 서비스를 제공하는 각 시장의 규제 체계를 준수하며 책임 있게 운영하고, 단기 사업 확장보다 장기 지속 가능성과 이용자 보호를 우선합니다.</p>\n<h2 id=\"privacy\">개인정보 보호</h2>\n<p>KLOVER는 개인정보를 각 시장의 규정에 따라 책임 있게 처리하며, 전체 개인정보 처리방침은 출시 전에 공개합니다.</p>\n<h2 id=\"disclaimer\">일반 위험 고지</h2>\n<div class=\"kl-hint warning\"><div class=\"h-ic\"></div><div class=\"h-body\">디지털 토큰에는 가치 하락을 포함한 투자 위험이 따릅니다. 본 문서는 <strong>정보 제공만을 목적</strong>으로 하며, 금융·투자·법률 자문에 해당하지 않습니다. 본 문서의 어떤 내용도 특정 자산의 매수 또는 매도를 권유하는 것이 아닙니다. 반드시 스스로 충분히 조사하고 판단하세요.</div></div>",

(function () {

  (function initTheme() {

  el.themeToggle.addEventListener('click', () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

  /* ---------- LANGUAGE ---------- */
  function buildLangMenu() {

      opt.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); } });
      el.langMenu.appendChild(opt);
    });
  }
  function setLang(code) {
    lang = code; KL_LANG = code;

  document.addEventListener('click', (e) => { if (!el.langDropdown.contains(e.target)) closeLangMenu(); });
  function applyStaticI18n() {

      '</div>' +
