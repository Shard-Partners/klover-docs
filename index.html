  /* ---------- $KLVR tokenomics: allocation table + release schedule chart ---------- */
  /* TGE = 2026 Q4 (Nov 2026) = month 0. Linear vesting begins after the cliff. */
  var KLVR_TK = [
    { ko:'유동성 (CEX 및 DEX 상장)', en:'Liquidity (CEX & DEX)',          pct:10.0, tge:100, cliff:0,  vest:0,  color:'#2f7d54' },
    { ko:'생태계 발전기금',           en:'Ecosystem Development Fund',     pct:50.0, tge:100, cliff:0,  vest:0,  color:'#1f5236' },
    { ko:'에어드랍',                  en:'Airdrop',                        pct:2.5,  tge:100, cliff:0,  vest:0,  color:'#6aa67f' },
    { ko:'마케팅',                    en:'Marketing',                      pct:0.5,  tge:0,   cliff:3,  vest:3,  color:'#aab36a' },
    { ko:'재단',                      en:'Foundation',                     pct:10.0, tge:0,   cliff:24, vest:24, color:'#3d7c80' },
    { ko:'투자자 (Private Round)',    en:'Investors (Private Round)',      pct:10.0, tge:0,   cliff:6,  vest:12, color:'#5878a0' },
    { ko:'금고',                      en:'Treasury',                       pct:5.0,  tge:0,   cliff:12, vest:36, color:'#7e7194' },
    { ko:'예비',                      en:'Reserve',                        pct:2.0,  tge:0,   cliff:6,  vest:24, color:'#97907f' },
    { ko:'인생네컷',                  en:'Life4Cut',                       pct:3.0,  tge:0,   cliff:24, vest:24, color:'#c06b4a' },
    { ko:'초기 파트너 (소속사 등)',   en:'Initial Partners (labels, etc.)',pct:7.0,  tge:0,   cliff:24, vest:24, color:'#b58a3c' }
  ];
  var KLVR_STACK = [1,0,2,5,4,9,6,8,3,7]; /* bottom -> top: constant unlocks first, then vesting */
  function klvrRelFrac(c, m){ var b=c.tge/100; if(b>=1) return 1; var r=1-b, vp; if(m<c.cliff) vp=0; else if(c.vest<=0||m>=c.cliff+c.vest) vp=1; else vp=(m-c.cliff)/c.vest; return b+r*vp; }
  function klvrQLabel(qi){ var q=4+qi, y=2026; y+=Math.floor((q-1)/4); q=((q-1)%4)+1; return y+' Q'+q; }
  function klvrDur(n, ko){ return n<=0 ? '–' : (n + (ko ? '개월' : ' mo')); }
  function initKlvrChart(){
    var host = document.getElementById('klvr-chart');
    var thost = document.getElementById('klvr-table');
    if (!host && !thost) return;
    var ko = (lang === 'ko');
    /* ----- table ----- */
    if (thost){
      var th = '<table class="kl-table klvr-alloc"><thead><tr>'
        + '<th>'+(ko?'카테고리':'Category')+'</th>'
        + '<th class="num">'+(ko?'비율':'Allocation')+'</th>'
        + '<th class="num">'+(ko?'TGE 즉시 지급':'TGE Unlock')+'</th>'
        + '<th class="num">'+(ko?'Cliff (락업)':'Cliff')+'</th>'
        + '<th class="num">'+(ko?'Vesting (베스팅)':'Vesting')+'</th>'
        + '</tr></thead><tbody>';
      for (var r=0; r<KLVR_TK.length; r++){
        var c = KLVR_TK[r];
        var locked = (c.tge >= 100);
        th += '<tr>'
          + '<td><span class="klvr-cat"><span class="klvr-cat-dot" style="background:'+c.color+'"></span>'+(ko?c.ko:c.en)+'</span></td>'
          + '<td class="num">'+(c.pct % 1 === 0 ? c.pct.toFixed(0) : c.pct.toFixed(1))+'%</td>'
          + '<td class="num">'+c.tge+'%</td>'
          + '<td class="num">'+(locked?'–':klvrDur(c.cliff, ko))+'</td>'
          + '<td class="num">'+(locked?'–':klvrDur(c.vest, ko))+'</td>'
          + '</tr>';
      }
      th += '</tbody><tfoot><tr><td>'+(ko?'합계':'Total')+'</td><td class="num">100%</td><td class="num"></td><td class="num"></td><td class="num"></td></tr></tfoot></table>';
      thost.innerHTML = th;
    }
    /* ----- chart ----- */
    if (!host) return;
    var N = 17, W = 860, H = 384, mL = 38, mR = 12, mT = 22, mB = 38;
    var pW = W-mL-mR, pH = H-mT-mB;
    var X = function(qi){ return mL + (qi/(N-1))*pW; };
    var Y = function(p){ return mT + (1 - p/100)*pH; };
    var lower = {}, upper = {}, totals = [];
    for (var qi=0; qi<N; qi++){
      var m = qi*3, cum = 0;
      for (var s=0; s<KLVR_STACK.length; s++){
        var i = KLVR_STACK[s], v = KLVR_TK[i].pct * klvrRelFrac(KLVR_TK[i], m);
        lower[i] = lower[i] || []; upper[i] = upper[i] || [];
        lower[i][qi] = cum; cum += v; upper[i][qi] = cum;
      }
      totals[qi] = cum;
    }
    var svg = '<svg viewBox="0 0 '+W+' '+H+'" class="klvr-svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="$KLVR Release Schedule">';
    for (var g=0; g<=100; g+=25){
      var yy = Y(g);
      svg += '<line class="klvr-grid" x1="'+mL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-mR)+'" y2="'+yy.toFixed(1)+'"/>';
      svg += '<text class="klvr-axis-y" x="'+(mL-7)+'" y="'+(yy+3).toFixed(1)+'">'+g+'</text>';
    }
    for (var s2=0; s2<KLVR_STACK.length; s2++){
      var i2 = KLVR_STACK[s2], d = 'M';
      for (var q1=0; q1<N; q1++){ d += (q1?' L':'') + X(q1).toFixed(1)+','+Y(upper[i2][q1]).toFixed(1); }
      for (var q2=N-1; q2>=0; q2--){ d += ' L'+X(q2).toFixed(1)+','+Y(lower[i2][q2]).toFixed(1); }
      d += ' Z';
      svg += '<path class="klvr-area" data-i="'+i2+'" d="'+d+'" fill="'+KLVR_TK[i2].color+'"/>';
    }
    for (var qx=0; qx<N; qx+=2){ svg += '<text class="klvr-axis-x" x="'+X(qx).toFixed(1)+'" y="'+(H-mB+18)+'">'+klvrQLabel(qx)+'</text>'; }
    svg += '<line class="klvr-tge-line" x1="'+X(0).toFixed(1)+'" y1="'+mT+'" x2="'+X(0).toFixed(1)+'" y2="'+(mT+pH)+'"/>';
    svg += '<text class="klvr-tge" x="'+X(0).toFixed(1)+'" y="'+(mT-7)+'">TGE · 2026 Q4</text>';
    svg += '<line class="klvr-cross" x1="0" y1="'+mT+'" x2="0" y2="'+(mT+pH)+'" style="opacity:0"/>';
    svg += '<g class="klvr-dots"></g>';
    svg += '<rect class="klvr-overlay" x="'+mL+'" y="'+mT+'" width="'+pW+'" height="'+pH+'" fill="transparent"/>';
    svg += '</svg>';
    var legend = '<div class="klvr-legend">';
    for (var L=0; L<KLVR_TK.length; L++){ legend += '<span class="klvr-leg-item"><span class="klvr-sw" style="background:'+KLVR_TK[L].color+'"></span>'+(ko?KLVR_TK[L].ko:KLVR_TK[L].en)+'</span>'; }
    legend += '</div>';
    host.innerHTML = '<div class="klvr-chart-head"><span class="klvr-chart-title">$KLVR Release Schedule</span><span class="klvr-chart-unit">'+(ko?'총 발행량 대비 %':'% of total supply')+'</span></div>'
      + '<div class="klvr-chart-plot">'+svg+'<div class="klvr-tip" style="opacity:0"></div></div>' + legend;
    var svgEl = host.querySelector('.klvr-svg'), overlay = host.querySelector('.klvr-overlay');
    var cross = host.querySelector('.klvr-cross'), dots = host.querySelector('.klvr-dots');
    var tip = host.querySelector('.klvr-tip'), plot = host.querySelector('.klvr-chart-plot');
    var areas = host.querySelectorAll('.klvr-area');
    function loc(evt){ var rc = svgEl.getBoundingClientRect(); return { sx:(evt.clientX-rc.left)*(W/rc.width), sy:(evt.clientY-rc.top)*(H/rc.height) }; }
    function show(evt){
      var p = loc(evt);
      var qi = Math.round(((p.sx-mL)/pW)*(N-1)); if (qi<0) qi=0; if (qi>N-1) qi=N-1;
      var xx = X(qi);
      cross.setAttribute('x1', xx); cross.setAttribute('x2', xx); cross.style.opacity = 1;
      var hot = -1;
      for (var i=0; i<KLVR_TK.length; i++){ if (upper[i] && p.sy<=Y(lower[i][qi]) && p.sy>=Y(upper[i][qi]) && (upper[i][qi]-lower[i][qi])>0.001){ hot=i; break; } }
      var dh = '';
      for (var s=0; s<KLVR_STACK.length; s++){ var i=KLVR_STACK[s]; if (upper[i][qi]-lower[i][qi] < 0.001) continue; dh += '<circle cx="'+xx.toFixed(1)+'" cy="'+Y(upper[i][qi]).toFixed(1)+'" r="'+(i===hot?4:2.4)+'" fill="'+KLVR_TK[i].color+'" stroke="var(--kl-bg)" stroke-width="1.2"/>'; }
      dots.innerHTML = dh;
      for (var a=0; a<areas.length; a++){ areas[a].classList.toggle('dim', hot>=0 && +areas[a].getAttribute('data-i')!==hot); }
      var m = qi*3, rows = '';
      for (var sr=KLVR_STACK.length-1; sr>=0; sr--){ var i=KLVR_STACK[sr]; var v=upper[i][qi]-lower[i][qi]; rows += '<div class="klvr-tip-row'+(i===hot?' hot':'')+'"><span class="klvr-sw" style="background:'+KLVR_TK[i].color+'"></span><span class="klvr-tip-name">'+(ko?KLVR_TK[i].ko:KLVR_TK[i].en)+'</span><span class="klvr-tip-val">'+v.toFixed(1)+'%</span></div>'; }
      tip.innerHTML = '<div class="klvr-tip-head"><b>'+klvrQLabel(qi)+'</b><span>TGE+'+m+(ko?'개월':'mo')+'</span></div>'
        + '<div class="klvr-tip-total">'+(ko?'총 유통량':'Circulating')+' <b>'+totals[qi].toFixed(1)+'%</b></div>' + rows;
      var leftPx = (xx/W)*plot.clientWidth, tw = tip.offsetWidth || 200;
      var lp = leftPx + 18; if (lp+tw > plot.clientWidth) lp = leftPx - tw - 18; if (lp < 0) lp = 4;
      tip.style.left = lp+'px'; tip.style.top = '6px'; tip.style.opacity = 1;
    }
    function hide(){ cross.style.opacity=0; tip.style.opacity=0; dots.innerHTML=''; for (var a=0;a<areas.length;a++) areas[a].classList.remove('dim'); }
    overlay.addEventListener('mousemove', show);
    overlay.addEventListener('mouseleave', hide);
    overlay.addEventListener('touchstart', function(e){ if(e.touches[0]) show(e.touches[0]); }, {passive:true});
    overlay.addEventListener('touchmove', function(e){ if(e.touches[0]) show(e.touches[0]); }, {passive:true});
  }

  /* ---------- TOC ---------- */
  let tocObserver = null;
  function buildToc(id) {
    if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
    el.toc.innerHTML = '';
    const tocTitle = document.querySelector('.kl-toc-title');
    const showTitle = (v) => { if (tocTitle) tocTitle.style.display = v ? '' : 'none'; };
    if (id === 'home') { showTitle(false); return; }
    const heads = Array.from(el.content.querySelectorAll('h2[id]'));
    if (!heads.length) { showTitle(false); return; }
    showTitle(true);
    heads.forEach(h => {
      const a = document.createElement('a');
      a.className = 'kl-toc-link'; a.href = '#' + h.id; a.textContent = h.textContent; a.setAttribute('data-anchor', h.id);
      a.addEventListener('click', (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth', block: 'start' }); });
      el.toc.appendChild(a);
    });
    tocObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const hid = entry.target.id;
          el.toc.querySelectorAll('.kl-toc-link').forEach(l => l.classList.toggle('active', l.getAttribute('data-anchor') === hid));
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });
    heads.forEach(h => tocObserver.observe(h));
  }
  function setActiveStates(route) {
    document.querySelectorAll('.kl-nav-link').forEach(l => l.classList.toggle('active', l.getAttribute('data-nav') === route.section));
  }

  /* ---------- SEARCH ---------- */
  function stripHtml(s) { const d = document.createElement('div'); d.innerHTML = s; return (d.textContent || '').replace(/\s+/g, ' ').trim(); }
  function esc(s) { return s.replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
  function buildIndex() {
    const idx = [];
    ORDER.forEach(id => {
      if (id === 'home') return;
      idx.push({ section: id, title: navLabel(id), crumb: t('ui.docs'), text: stripHtml(pageHtml(id)) });
    });
    return idx;
  }
  let searchIndex = [];
  function runSearch(q) {
    q = q.trim().toLowerCase();
    if (!q) { el.searchResults.classList.remove('open'); el.searchResults.innerHTML = ''; return; }
    const hits = [];
    for (const item of searchIndex) {
      const hay = (item.title + ' ' + item.text).toLowerCase();
      const pos = hay.indexOf(q);
      if (pos >= 0) hits.push({ item, score: (item.title.toLowerCase().includes(q) ? 0 : 100) + pos });
    }
    hits.sort((a, b) => a.score - b.score);
    renderSearchResults(hits.slice(0, 10), q);
  }
  function highlight(text, q) {
    const i = text.toLowerCase().indexOf(q);
    if (i < 0) return esc(text.slice(0, 90));
    const start = Math.max(0, i - 30);
    const snippet = (start > 0 ? '…' : '') + text.slice(start, i + q.length + 50);
    const j = snippet.toLowerCase().indexOf(q);
    return esc(snippet.slice(0, j)) + '<mark>' + esc(snippet.slice(j, j + q.length)) + '</mark>' + esc(snippet.slice(j + q.length));
  }
  function renderSearchResults(hits, q) {
    if (!hits.length) { el.searchResults.innerHTML = '<div class="kl-search-empty">' + t('ui.searchNoResults') + '</div>'; el.searchResults.classList.add('open'); return; }
    el.searchResults.innerHTML = hits.map(h => '<a class="kl-result" href="' + sectionToPath(h.item.section) + '" data-route="' + h.item.section + '"><div class="r-crumb">' + esc(h.item.crumb) + '</div><div class="r-title">' + esc(h.item.title) + '</div>' + (h.item.text ? '<div class="r-snippet">' + highlight(h.item.text, q) + '</div>' : '') + '</a>').join('');
    el.searchResults.classList.add('open');
    el.searchResults.querySelectorAll('.kl-result').forEach(r => r.addEventListener('click', (e) => { e.preventDefault(); navigate(r.getAttribute('data-route')); el.searchResults.classList.remove('open'); el.search.value = ''; }));
  }
  el.search.addEventListener('input', () => { searchIndex = buildIndex(); runSearch(el.search.value); });
  el.search.addEventListener('focus', () => { searchIndex = buildIndex(); if (el.search.value) runSearch(el.search.value); });
  document.addEventListener('click', (e) => { if (!e.target.closest('.kl-search-wrap')) el.searchResults.classList.remove('open'); });
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== el.search) { e.preventDefault(); el.search.focus(); }
    if (e.key === 'Escape') { el.searchResults.classList.remove('open'); el.search.blur(); closeLangMenu(); closeModal(); }
  });

  /* ---------- COMPONENT INTERACTIONS (delegated) ---------- */
  document.addEventListener('click', (e) => {
    const copyBtn = e.target.closest('[data-copy]');
    if (copyBtn) {
      const pre = copyBtn.closest('.kl-code').querySelector('code');
      const text = pre ? pre.textContent : '';
      navigator.clipboard && navigator.clipboard.writeText(text);
      const orig = copyBtn.textContent; copyBtn.textContent = t('ui.copied');
      setTimeout(() => { copyBtn.textContent = orig; }, 1400);
    }
    const tabHead = e.target.closest('.kl-tab-head');
    if (tabHead) {
      const tabs = tabHead.closest('[data-tabs]'); const i = +tabHead.getAttribute('data-tab');
      tabs.querySelectorAll('.kl-tab-head').forEach((b, k) => b.classList.toggle('active', k === i));
      tabs.querySelectorAll('.kl-tab-pane').forEach((p, k) => p.classList.toggle('active', k === i));
    }
    const accHead = e.target.closest('.kl-acc-head');
    if (accHead) accHead.closest('.kl-accordion').classList.toggle('open');
    const helpBtn = e.target.closest('[data-helpful]');
    if (helpBtn) { const box = document.getElementById('helpful'); if (box) box.innerHTML = '<span class="thanks">' + t('ui.helpfulThanks') + '</span>'; }
  });

  /* ---------- MOBILE NAV ---------- */
  function openMobileNav() { document.body.classList.add('nav-open'); }
  function closeMobileNav() { document.body.classList.remove('nav-open'); }
  function closeMobileNavMaybe() { if (window.innerWidth <= 860) closeMobileNav(); }
  el.menuToggle.addEventListener('click', () => document.body.classList.contains('nav-open') ? closeMobileNav() : openMobileNav());
  el.scrim.addEventListener('click', closeMobileNav);
  document.addEventListener('click', (e) => {
    const navEl = e.target.closest('[data-nav]');
    if (!navEl) return;
    e.preventDefault();
    navigate(navEl.getAttribute('data-nav'));
    closeMobileNavMaybe();
  });

  /* ---------- INIT ---------- */
  function init() {
    document.documentElement.setAttribute('lang', lang);
    const meta = LANGS.find(l => l.code === lang);
    el.langCurrent.textContent = meta ? meta.native : 'English';
    applyStaticI18n(); buildLangMenu(); renderNav(); renderPage(current, false);
  }
  init();
})();
</script>
</body>
</html>
